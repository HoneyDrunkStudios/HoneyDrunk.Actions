# Example: Build and deploy an Azure Function App
# Consumer repo workflow that builds a .NET Function App
# and deploys it using HoneyDrunk.Actions.

name: Release & Deploy Function

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build Function App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish MyProject.Functions/MyProject.Functions.csproj \
            -c Release \
            -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: function-app
          path: ./publish

  deploy:
    name: Deploy to Azure
    needs: build
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/job-deploy-function.yml@main
    with:
      functions-app: my-function-app
      resource-group: my-resource-group
      artifact-name: function-app
      package-path: ./publish
      # Optional: slot-based deployment
      # slot-name: staging
      # swap-to-production: true
      # Optional: health check
      # health-check-url: /api/health
      # Optional: Key Vault secret injection
      # keyvault-name: my-keyvault
      # keyvault-secrets: |
      #   ResendApiKey=RESEND_API_KEY
      #   TwilioAccountSid=TWILIO_ACCOUNT_SID
    secrets:
      azure-client-id: ${{ vars.AZURE_CLIENT_ID }}
      azure-tenant-id: ${{ vars.AZURE_TENANT_ID }}
      azure-subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

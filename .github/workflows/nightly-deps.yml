# ==============================================================================
# Nightly Dependencies Workflow
# ==============================================================================
# Purpose:
#   Detect outdated dependencies and optionally create update PRs.
#   Runs on a schedule to keep dependencies current and secure.
#
# Responsibilities:
#   - Detect outdated NuGet packages
#   - Detect outdated npm packages (if applicable)
#   - Detect outdated other package managers
#   - Generate machine-readable dependency report
#   - Optionally create or update dependency upgrade PRs
#   - Check for deprecated packages
#
# Target:
#   All repos in the HoneyDrunk Grid
#
# Triggers:
#   - This workflow is reusable via workflow_call
#   - Consuming repos should trigger on schedule (e.g., cron: '0 3 * * 1-5')
#   - Can also be triggered manually via workflow_dispatch
#
# Non-goals:
#   - This does NOT block merges or fail builds
#   - This is for maintenance visibility and automation only
#
# Usage Example:
#   See docs/consumer-usage.md for sample consumer workflows
# ==============================================================================

name: Nightly Dependencies

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: 'The .NET SDK version to use'
        required: false
        type: string
        default: '10.0.x'
      
      node-version:
        description: 'Node.js version (if repo has npm dependencies)'
        required: false
        type: string
        default: '20.x'
      
      runs-on:
        description: 'GitHub runner to use'
        required: false
        type: string
        default: 'ubuntu-latest'
      
      working-directory:
        description: 'Working directory for all operations'
        required: false
        type: string
        default: '.'
      
      project-path:
        description: 'Path to solution or project file (auto-detected if not specified)'
        required: false
        type: string
        default: ''
      
      check-dotnet-deps:
        description: 'Check .NET/NuGet dependencies'
        required: false
        type: boolean
        default: true
      
      check-npm-deps:
        description: 'Check npm dependencies'
        required: false
        type: boolean
        default: false
      
      create-update-prs:
        description: 'Automatically create PRs for dependency updates'
        required: false
        type: boolean
        default: false
      
      pr-branch-prefix:
        description: 'Prefix for auto-created PR branches'
        required: false
        type: string
        default: 'deps/auto-update'
      
      group-updates:
        description: 'Group multiple dependency updates into single PR'
        required: false
        type: boolean
        default: true
      
      exclude-prerelease:
        description: 'Exclude pre-release versions from updates'
        required: false
        type: boolean
        default: true
      
      actions-ref:
        description: 'Git ref of HoneyDrunk.Actions to use'
        required: false
        type: string
        default: 'main'
    
    secrets:
      github-token:
        description: 'GitHub token for creating PRs'
        required: false

permissions:
  contents: read

jobs:
  detect-dotnet-outdated:
    name: Detect Outdated .NET Dependencies
    if: ${{ inputs.check-dotnet-deps }}
    runs-on: ${{ inputs.runs-on }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Checkout HoneyDrunk.Actions
        uses: actions/checkout@v4
        with:
          repository: HoneyDrunkStudios/HoneyDrunk.Actions
          path: .github/actions-repo
          ref: ${{ inputs.actions-ref }}
      
      - name: Setup .NET SDK
        uses: ./.github/actions-repo/.github/actions/dotnet/setup
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      
      - name: Restore dependencies
        uses: ./.github/actions-repo/.github/actions/dotnet/restore
        with:
          working-directory: ${{ inputs.working-directory }}
          project-path: ${{ inputs.project-path }}
      
      - name: Scan for outdated packages
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          echo "Scanning for outdated .NET packages..."
          
          TARGET="${{ inputs.project-path }}"
          if [ -z "$TARGET" ]; then
            # Try to find solution or project
            SOLN=$(find . -maxdepth 4 \( -name "*.sln" -o -name "*.slnx" \) | head -n 1 || true)
            if [ -n "$SOLN" ]; then
              TARGET="$SOLN"
            else
              TARGET="."
            fi
          fi
          
          echo "Scanning target: $TARGET"
          
          # List outdated packages
          dotnet list "$TARGET" package --outdated --include-transitive > outdated-packages.txt || true
          cat outdated-packages.txt
          
          # Extract package update information
          echo "Package scan complete. Results saved to outdated-packages.txt"
      
      - name: Generate dependency report
        uses: ./.github/actions-repo/.github/actions/deps/report-dotnet
        with:
          working-directory: ${{ inputs.working-directory }}
          project-path: ${{ inputs.project-path }}
          exclude-prerelease: ${{ inputs.exclude-prerelease }}
          output-directory: ./dependency-reports
      
      - name: Check for deprecated packages
        uses: ./.github/actions-repo/.github/actions/deps/check-deprecated
        with:
          working-directory: ${{ inputs.working-directory }}
          project-path: ${{ inputs.project-path }}
          output-directory: ./dependency-reports
      
      - name: Upload .NET dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-dependency-report
          path: |
            ${{ inputs.working-directory }}/dependency-reports/**/*
            ${{ inputs.working-directory }}/outdated-packages.txt
          retention-days: 30
  
  detect-npm-outdated:
    name: Detect Outdated npm Dependencies
    if: ${{ inputs.check-npm-deps }}
    runs-on: ${{ inputs.runs-on }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Checkout HoneyDrunk.Actions
        uses: actions/checkout@v4
        with:
          repository: HoneyDrunkStudios/HoneyDrunk.Actions
          path: .github/actions-repo
          ref: ${{ inputs.actions-ref }}
      
      - name: Check for package.json
        id: check-npm
        shell: bash
        run: |
          if [ -f "package.json" ]; then
            echo "has_npm=true" >> $GITHUB_OUTPUT
            echo "Found package.json, will scan npm dependencies"
          else
            echo "has_npm=false" >> $GITHUB_OUTPUT
            echo "No package.json found, skipping npm scan"
          fi
      
      - name: Setup Node.js
        if: steps.check-npm.outputs.has_npm == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      
      - name: Scan for outdated npm packages
        if: steps.check-npm.outputs.has_npm == 'true'
        shell: bash
        run: |
          echo "Scanning for outdated npm packages..."
          npm outdated --json > npm-outdated.json || true
          cat npm-outdated.json
      
      - name: Generate npm dependency report
        if: steps.check-npm.outputs.has_npm == 'true'
        uses: ./.github/actions-repo/.github/actions/deps/report-npm
        with:
          working-directory: '.'
          output-directory: ./dependency-reports
      
      - name: Upload npm dependency report
        if: steps.check-npm.outputs.has_npm == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: npm-dependency-report
          path: |
            ./dependency-reports/**/*
            ./npm-outdated.json
          retention-days: 30
  
  create-update-prs:
    name: Create Dependency Update PRs
    if: ${{ inputs.create-update-prs }}
    needs: [detect-dotnet-outdated, detect-npm-outdated]
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.github-token || github.token }}
      
      - name: Download dependency reports
        uses: actions/download-artifact@v4
        with:
          path: ./all-dependency-reports
      
      - name: Checkout HoneyDrunk.Actions
        uses: actions/checkout@v4
        with:
          repository: HoneyDrunkStudios/HoneyDrunk.Actions
          path: .github/actions-repo
          ref: ${{ inputs.actions-ref }}
      
      - name: Setup .NET SDK
        if: ${{ inputs.check-dotnet-deps }}
        uses: ./.github/actions-repo/.github/actions/dotnet/setup
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      
      - name: Setup Node.js
        if: ${{ inputs.check-npm-deps }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      
      - name: Generate and apply dependency updates
        uses: ./.github/actions-repo/.github/actions/deps/create-update-prs
        with:
          reports-directory: ./all-dependency-reports
          branch-prefix: ${{ inputs.pr-branch-prefix }}
          group-updates: ${{ inputs.group-updates }}
          labels: 'dependencies,automated'
        env:
          GH_TOKEN: ${{ secrets.github-token || github.token }}
  
  consolidate-report:
    name: Consolidate Dependency Report
    needs: [detect-dotnet-outdated, detect-npm-outdated]
    if: always()
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      issues: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download all dependency reports
        uses: actions/download-artifact@v4
        with:
          path: ./all-dependency-reports
      
      - name: Checkout HoneyDrunk.Actions
        uses: actions/checkout@v4
        with:
          repository: HoneyDrunkStudios/HoneyDrunk.Actions
          path: .github/actions-repo
          ref: ${{ inputs.actions-ref }}

      - name: Consolidate dependency findings
        uses: ./.github/actions-repo/.github/actions/deps/consolidate-reports
        with:
          input-directory: ./all-dependency-reports
          output-path: ./consolidated-dependency-report.json
      
      - name: Maintain grouped tracking issue
        shell: bash
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.github-token || github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ISSUE_TITLE: 📦 Outdated Dependencies
        run: |
          set +e
          python3 <<'PY'
          import json, os, subprocess, sys
          from datetime import datetime, timezone
          from pathlib import Path

          title = os.environ['ISSUE_TITLE']
          repo = os.environ['GITHUB_REPOSITORY']
          run_url = os.environ['RUN_URL']
          ts = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z')
          report_path = Path('consolidated-dependency-report.json')
          body_path = Path('outdated-dependencies-issue.md')

          def run(cmd, check=False, capture=False):
              print('+ ' + ' '.join(cmd))
              return subprocess.run(cmd, text=True, stdout=subprocess.PIPE if capture else None, stderr=subprocess.STDOUT if capture else None, check=check)

          def warn(message):
              print(f'::warning::{message}')

          try:
              data = json.loads(report_path.read_text(encoding='utf-8')) if report_path.exists() else {}
              packages = []
              for key in ('dotnet_packages', 'npm_packages'):
                  for pkg in data.get(key, []) or []:
                      name = pkg.get('name') or pkg.get('package') or ''
                      current = pkg.get('current') or pkg.get('currentVersion') or pkg.get('wanted') or 'unknown'
                      latest = pkg.get('latest') or pkg.get('latestVersion') or 'unknown'
                      if name:
                          packages.append((name, current, latest))
              packages = sorted(set(packages), key=lambda p: p[0].lower())
              count = len(packages)

              if count:
                  lines = [f'_Last scanned: {ts} · {count} package(s) behind · run: {run_url}_', '']
                  lines.extend(f'- `{name}`: {current} → {latest}' for name, current, latest in packages)
                  lines.extend(['', 'Non-blocking. Outdated ≠ vulnerable — vulnerable packages block PRs separately. This issue is regenerated by nightly-deps every run; do not edit by hand.'])
              else:
                  lines = [f'✅ All dependencies current as of `{ts}`.', '', f'Run: {run_url}']
              body_path.write_text('\n'.join(lines) + '\n', encoding='utf-8')

              issue_result = run(['gh', 'issue', 'list', '--repo', repo, '--search', f'in:title "{title}"', '--state', 'all', '--json', 'number,title,state'], capture=True)
              if issue_result.returncode != 0:
                  warn('Could not list dependency tracking issues; skipping maintenance.')
                  sys.exit(0)
              exact = [i for i in json.loads(issue_result.stdout or '[]') if i.get('title') == title]
              issue = exact[0] if exact else None

              if count:
                  if issue and issue.get('state') == 'CLOSED':
                      run(['gh', 'issue', 'reopen', str(issue['number']), '--repo', repo], check=False)
                  if issue:
                      run(['gh', 'issue', 'edit', str(issue['number']), '--repo', repo, '--body-file', str(body_path)], check=False)
                  else:
                      run(['gh', 'label', 'create', 'dependencies', '--repo', repo, '--color', '0366d6', '--description', 'Dependency maintenance', '--force'], check=False)
                      run(['gh', 'issue', 'create', '--repo', repo, '--title', title, '--body-file', str(body_path), '--label', 'dependencies'], check=False)
              elif issue and issue.get('state') == 'OPEN':
                  run(['gh', 'issue', 'edit', str(issue['number']), '--repo', repo, '--body-file', str(body_path)], check=False)
                  run(['gh', 'issue', 'close', str(issue['number']), '--repo', repo, '--comment', f'All dependencies current as of {ts} UTC (run {run_url}).'], check=False)
              else:
                  print('No outdated dependencies and no open tracking issue; nothing to maintain.')
          except Exception as exc:
              warn(f'Dependency issue maintenance skipped after error: {exc}')
              sys.exit(0)
          PY
          exit 0

      - name: Generate summary
        shell: bash
        run: |
          echo "# Nightly Dependency Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ inputs.check-dotnet-deps }}" == "true" ]; then
            echo "- .NET Dependencies: ${{ needs.detect-dotnet-outdated.result }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ inputs.check-npm-deps }}" == "true" ]; then
            echo "- npm Dependencies: ${{ needs.detect-npm-outdated.result }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ inputs.create-update-prs }}" == "true" ]; then
            echo "**Auto-update PRs:** Enabled" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Auto-update PRs:** Disabled (reports only)" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download artifacts for detailed dependency reports." >> $GITHUB_STEP_SUMMARY
      
      - name: Upload consolidated report
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-dependency-report
          path: ./consolidated-dependency-report.*
          retention-days: 30

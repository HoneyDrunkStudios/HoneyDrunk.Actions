# ==============================================================================
# SonarQube Cloud Static Analysis Job (Tier 2)
# ==============================================================================
# Purpose:
#   Run SonarQube Cloud (formerly SonarCloud — rebrand 2026) static analysis
#   on a .NET repo using `dotnet-sonarscanner`. Reuses the coverage artifact
#   from `job-build-and-test.yml`, publishes coverage to SonarQube Cloud,
#   and reports the SonarQube Cloud quality gate as a PR check.
#
# Tier:
#   Tier 2 of the ADR-0011 PR review pipeline. Required check on public repos
#   per ADR-0011 D11.
#
# CALLER TRIGGER CONTRACT (load-bearing — read this if you are wiring a new caller):
#   This workflow is `workflow_call`-only. It MUST only be invoked from a
#   caller workflow whose `on:` block fires on `pull_request` events or `push`
#   events to `main` — not on every feature-branch push, not on tags, not on
#   schedule, not on workflow_dispatch from arbitrary refs.
#
#   The job below carries an `if:` guard that refuses to run when this
#   constraint is violated, so a misconfigured caller will produce a no-op
#   skipped job rather than burning a SonarQube Cloud run on every
#   feature-branch push. Per ADR-0011 D11 cost discipline.
#
# Cost discipline:
#   - pull_request and push:main only — enforced by both the caller's `on:`
#     block AND the job-level `if:` guard below
#   - Median PR run target: under 60 seconds
#   - Coverage report reused from `job-build-and-test.yml` artifact (no second
#     `dotnet test` run)
#   - SonarQube Cloud OSS plan: free for unlimited public LOC; private LOC is
#     paid per LOC and is intentionally out of scope (ADR-0011 D11 Gap 5)
#
# Secret:
#   SONAR_TOKEN — provisioned as a GitHub org secret with `Selected repositories`
#   scope. Provisioning lives in `infrastructure/walkthroughs/sonarcloud-organization-setup.md`
#   in HoneyDrunk.Architecture. Free/OSS plan caps Personal Access Token
#   expiration at 60 days — rotation discipline is tracked on the operator's
#   calendar; the broader external-SaaS credential rotation policy is being
#   formalized in a separate ADR (see `generated/adr-drafts/`).
#
# Single Responsibility:
#   SonarQube Cloud analysis only. Does not run tests (reuses
#   `job-build-and-test.yml`'s coverage artifact). Does not gate on Sonar Way
#   quality-gate failure — failure surfaces via the PR check that SonarQube
#   Cloud itself publishes; branch protection enforces it as a required check
#   on a per-repo basis.
#
# Non-goals:
#   Vulnerability scanning (see `job-dependency-scan.yml`), CodeQL SAST (see
#   `job-codeql.yml`), secret scanning (see `job-secret-scan.yml`), analyzers
#   and formatting (see `job-static-analysis.yml`).
# ==============================================================================

name: SonarQube Cloud (Job)

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: 'The .NET SDK version to use'
        required: false
        type: string
        default: '10.0.x'

      runs-on:
        description: 'GitHub runner to use'
        required: false
        type: string
        default: 'ubuntu-latest'

      working-directory:
        description: 'Working directory for build (inner project subdir, NOT git root)'
        required: false
        type: string
        default: '.'

      project-path:
        description: 'Path to solution or project file (auto-detected if not specified)'
        required: false
        type: string
        default: ''

      sonar-organization:
        description: 'SonarQube Cloud organization key (e.g. honeydrunkstudios)'
        required: true
        type: string

      sonar-project-key:
        description: 'SonarQube Cloud project key (e.g. honeydrunkstudios_HoneyDrunk.Kernel)'
        required: true
        type: string

      sonar-host-url:
        description: 'SonarQube Cloud host URL'
        required: false
        type: string
        default: 'https://sonarcloud.io'

      coverage-artifact-name:
        description: 'Name of the coverage artifact uploaded by job-build-and-test.yml'
        required: false
        type: string
        default: 'coverage-reports-ubuntu-latest'

      coverage-runsettings:
        description: 'Optional runsettings file to use as the base for push:main fallback coverage collection. When omitted, coverlet.runsettings in the working directory is used if present.'
        required: false
        type: string
        default: ''

      sonar-exclusions:
        description: 'Comma-separated SonarQube Cloud source exclusions. Defaults exclude consumer workflow wrapper YAML; workflow security is reviewed in HoneyDrunk.Actions.'
        required: false
        type: string
        default: '.github/workflows/**'

    secrets:
      sonar-token:
        description: 'SONAR_TOKEN — GitHub org secret scoped to HoneyDrunkStudios. Provisioning lives in HoneyDrunk.Architecture/infrastructure/walkthroughs/sonarcloud-organization-setup.md.'
        required: true
      github-token:
        description: 'GitHub token for PR decoration (falls back to github.token if not supplied)'
        required: false

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  sonarcloud:
    name: SonarQube Cloud
    runs-on: ${{ inputs.runs-on }}
    # Trigger guard — defence in depth for ADR-0011 D11 cost discipline.
    # Refuses to run when invoked from a misconfigured caller. The expected
    # caller `on:` block is `pull_request` and `push: branches: [main]`.
    # If a caller wires this workflow into a feature-branch push or a tag,
    # this guard reports a skipped job rather than spending a SonarQube Cloud run.
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # SonarQube Cloud requires full git history for blame attribution

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Set up Java (required by Sonar Scanner)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v5
        with:
          # Scanner cached at workspace root so the absolute
          # $GITHUB_WORKSPACE/.sonar/scanner path resolves regardless of the
          # caller's working-directory (which may be an inner subdir like
          # 'HoneyDrunk.Kernel/' for Pattern A consumer repos).
          path: ${{ github.workspace }}/.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/.sonar/scanner"
          dotnet tool update dotnet-sonarscanner --tool-path "${GITHUB_WORKSPACE}/.sonar/scanner"

      - name: Download coverage artifact (if exists)
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.coverage-artifact-name }}
          # Download into the caller's working-directory so the
          # `**/coverage.opencover.xml` glob passed to the scanner resolves
          # against the same root the scanner runs from.
          path: ${{ inputs.working-directory }}/TestResults
        continue-on-error: true

      - name: Begin SonarQube Cloud analysis
        working-directory: ${{ inputs.working-directory }}
        env:
          SONAR_TOKEN: ${{ secrets.sonar-token }}
          GITHUB_TOKEN: ${{ secrets.github-token || github.token }}
        shell: bash
        run: |
          # SonarScanner for .NET reads sonar.* configuration via `/d:` CLI flags or
          # MSBuild `<SonarQubeSetting>` items — NOT via `sonar-project.properties`
          # (a generic SonarScanner CLI convention the .NET scanner rejects).
          # The coverage report path must be passed explicitly here so the scanner
          # imports the OpenCover report produced by the conversion step below.
          # Per-repo overrides are possible via MSBuild `<SonarQubeSetting>` items
          # in Directory.Build.props if a repo needs to diverge from the default.
          "${GITHUB_WORKSPACE}/.sonar/scanner/dotnet-sonarscanner" begin \
            /k:"${{ inputs.sonar-project-key }}" \
            /o:"${{ inputs.sonar-organization }}" \
            /d:sonar.host.url="${{ inputs.sonar-host-url }}" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.exclusions="${{ inputs.sonar-exclusions }}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"

      - name: Build
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.project-path }}" ]; then
            dotnet build "${{ inputs.project-path }}" --configuration Release
          else
            dotnet build --configuration Release
          fi

      - name: Generate coverage (push:main fallback when no artifact was downloaded)
        working-directory: ${{ inputs.working-directory }}
        env:
          COVERAGE_RUNSETTINGS: ${{ inputs.coverage-runsettings }}
        shell: bash
        run: |
          set -euo pipefail
          # PR runs reuse the coverage artifact produced by the caller's pr-core
          # job (per ADR-0011 D11 cost discipline — no double `dotnet test`).
          # On push:main runs there is no pr-core (it's gated to pull_request),
          # so no upstream test job runs, so no artifact exists. Without coverage
          # here, the SonarCloud Overview dashboard's coverage metric stays 0%
          # forever and the leak-period baseline has no coverage to compare against.
          #
          # If the download step produced an OpenCover file, skip — PR path already
          # has what the scanner needs. Otherwise, run `dotnet test` with a coverlet
          # runsettings that emits OpenCover natively, so the main-branch analysis
          # has real data to report. ReportGenerator's OpenCover output is paid-only,
          # so post-hoc Cobertura→OpenCover conversion is not viable.
          if find ./TestResults -name "coverage.opencover.xml" 2>/dev/null | head -1 | grep -q .; then
            echo "::notice::OpenCover artifact found from caller (likely a PR run with pr-core); skipping local test execution."
            exit 0
          fi
          echo "::notice::No OpenCover artifact found (likely a push:main run); running tests with coverage so SonarCloud receives baseline data."
          RUNSETTINGS="$(pwd)/TestResults/coverlet.runsettings"
          mkdir -p "$(pwd)/TestResults"
          BASE_RUNSETTINGS="${COVERAGE_RUNSETTINGS:-}"
          if [ -z "$BASE_RUNSETTINGS" ] && [ -f "coverlet.runsettings" ]; then
            BASE_RUNSETTINGS="$(pwd)/coverlet.runsettings"
          fi
          if [ -n "$BASE_RUNSETTINGS" ] && [ ! -f "$BASE_RUNSETTINGS" ]; then
            echo "::error::coverage-runsettings was provided but does not exist: $BASE_RUNSETTINGS"
            exit 1
          fi
          export RUNSETTINGS BASE_RUNSETTINGS
          python3 <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          target = Path(os.environ["RUNSETTINGS"])
          base = os.environ.get("BASE_RUNSETTINGS") or ""

          def child(parent, name):
              for item in list(parent):
                  if item.tag.split("}", 1)[-1] == name:
                      return item
              return None

          if base:
              tree = ET.parse(base)
              root = tree.getroot()
              print(f"Using coverage runsettings base: {base}")
          else:
              root = ET.Element("RunSettings")
              tree = ET.ElementTree(root)
              print("No coverage runsettings base found; generating default coverlet settings.")

          dc_settings = child(root, "DataCollectionRunSettings")
          if dc_settings is None:
              dc_settings = ET.SubElement(root, "DataCollectionRunSettings")
          collectors = child(dc_settings, "DataCollectors")
          if collectors is None:
              collectors = ET.SubElement(dc_settings, "DataCollectors")
          collector = None
          for item in list(collectors):
              if item.tag.split("}", 1)[-1] == "DataCollector" and item.attrib.get("friendlyName") == "XPlat Code Coverage":
                  collector = item
                  break
          if collector is None:
              collector = ET.SubElement(collectors, "DataCollector", {"friendlyName": "XPlat Code Coverage"})
          config = child(collector, "Configuration")
          if config is None:
              config = ET.SubElement(collector, "Configuration")
          fmt = child(config, "Format")
          if fmt is None:
              fmt = ET.SubElement(config, "Format")
              existing = []
          else:
              existing = [part.strip() for part in (fmt.text or "").split(",") if part.strip()]

          merged = []
          seen = set()
          for part in existing + ["opencover", "cobertura"]:
              key = part.lower()
              if key not in seen:
                  seen.add(key)
                  merged.append(part)
          fmt.text = ",".join(merged)

          ET.indent(tree, space="  ")
          target.parent.mkdir(parents=True, exist_ok=True)
          tree.write(target, encoding="utf-8", xml_declaration=True)
          PY
          TEST_ARGS=(
            "--collect" "XPlat Code Coverage"
            "--settings" "$RUNSETTINGS"
            "--results-directory" "./TestResults"
            "--configuration" "Release"
            "--no-build"
          )
          if [ -n "${{ inputs.project-path }}" ]; then
            dotnet test "${{ inputs.project-path }}" "${TEST_ARGS[@]}"
          else
            dotnet test "${TEST_ARGS[@]}"
          fi

      - name: End SonarQube Cloud analysis
        working-directory: ${{ inputs.working-directory }}
        env:
          SONAR_TOKEN: ${{ secrets.sonar-token }}
        shell: bash
        run: |
          "${GITHUB_WORKSPACE}/.sonar/scanner/dotnet-sonarscanner" end /d:sonar.token="${SONAR_TOKEN}"

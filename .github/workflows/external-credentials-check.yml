# ==============================================================================
# External Credentials Drift Check
# ==============================================================================
# Purpose:
#   Scheduled drift-detection for the sensitive inventory per ADR-0083 D5.
#   Parses HoneyDrunk.Architecture/infrastructure/reference/sensitive-inventory.md,
#   filters by `Rotates: yes`, computes days-to-expiry against the runner's UTC
#   clock (ADR-0063 N2), and escalates:
#     - T-30 days or fewer: comment on the standing rotation issue, add `urgent`
#     - T-7  days or fewer: comment again, add `imminent`
#     - T+0  (expired):     file a SEV-2 incident record (via PR) per ADR-0054
#                           and comment on the standing issue
#
#   Drift-detection ONLY — never calls a provider API (ADR-0083 D5 rejected
#   alternative). The inventory is the source of truth.
#
# Notes:
#   - Discord escalation (ADR-0084 packet 10) is NOT shipped here; it edits this
#     workflow later to add notify-discord call sites. Until then the only
#     escalation surface is the gh-issue comment path.
#   - Reuses GH_ISSUE_TOKEN (cost discipline, ADR-0083 D1). Because this workflow
#     depends on that token, a silent GH_ISSUE_TOKEN expiry stops the watcher —
#     the run-summary heartbeat + grid-health watch entry are the mitigation.
# ==============================================================================

name: External Credentials Drift Check

on:
  schedule:
    # 13:00 UTC == 09:00 EDT / 08:00 EST. The T-30/T-7/T+0 thresholds are
    # day-grained, so the 1-hour seasonal shift is irrelevant.
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: read   # checkout the inventory file
  issues: write    # comment / open / label rotation issues in HoneyDrunk.Architecture

jobs:
  check-credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout HoneyDrunk.Architecture (inventory source)
        uses: actions/checkout@v4
        with:
          repository: HoneyDrunkStudios/HoneyDrunk.Architecture
          token: ${{ secrets.GH_ISSUE_TOKEN }}
          path: architecture

      - name: Checkout HoneyDrunk.Actions (scripts)
        uses: actions/checkout@v4
        with:
          path: actions

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Schema-check the inventory table
        run: |
          python3 actions/.github/scripts/inventory-schema-check.py \
            architecture/infrastructure/reference/sensitive-inventory.md

      - name: Parse and evaluate Rotates:yes rows
        run: |
          python3 actions/.github/scripts/inventory-evaluate.py \
            architecture/infrastructure/reference/sensitive-inventory.md \
            > escalations.json
          cat escalations.json

      - name: Apply T-30 escalations (urgent label + comment)
        env:
          GH_TOKEN: ${{ secrets.GH_ISSUE_TOKEN }}
        run: |
          python3 actions/.github/scripts/inventory-escalate.py \
            --tier urgent_T30 --escalations escalations.json

      - name: Apply T-7 escalations (imminent label + comment)
        env:
          GH_TOKEN: ${{ secrets.GH_ISSUE_TOKEN }}
        run: |
          python3 actions/.github/scripts/inventory-escalate.py \
            --tier imminent_T7 --escalations escalations.json

      - name: Apply T+0 escalations (SEV-2 incident PR + comment)
        env:
          GH_TOKEN: ${{ secrets.GH_ISSUE_TOKEN }}
        run: |
          python3 actions/.github/scripts/inventory-escalate.py \
            --tier expired_T0 --escalations escalations.json \
            --architecture-checkout architecture

      - name: Summary (+ heartbeat)
        if: always()
        run: |
          python3 actions/.github/scripts/inventory-summary.py escalations.json \
            >> "$GITHUB_STEP_SUMMARY"

# ==============================================================================
# External Credentials Drift Check
# ==============================================================================
# Purpose:
#   Scheduled drift-detection for the sensitive inventory per ADR-0083 D5.
#   Parses HoneyDrunk.Architecture/infrastructure/reference/sensitive-inventory.md,
#   filters by `Rotates: yes`, computes days-to-expiry against the runner's UTC
#   clock (ADR-0063 N2), and escalates:
#     - T-30 days or fewer: comment on the standing rotation issue, add `urgent`
#     - T-7  days or fewer: comment again, add `imminent`
#     - T+0  (expired):     file a SEV-2 incident record (via PR) per ADR-0054
#                           and comment on the standing issue
#
#   Drift-detection ONLY — never calls a provider API (ADR-0083 D5 rejected
#   alternative). The inventory is the source of truth.
#
# Discord escalation (ADR-0084 packet 10 / Phase 1):
#   After the gh-issue escalation steps, the credential names that crossed each
#   threshold are summarized into job outputs and routed to Discord via the
#   canonical seam `job-discord-notify.yml` (ADR-0084 D9 / D11 — no ad-hoc curl):
#     - T-30 -> #ops-alerts (medium)
#     - T-7  -> #ops-alerts + #security-alerts (high, multi-channel)
#     - T+0  -> #security-alerts (critical)
#   D6 also lists #audit-sensitive for T+0, but DISCORD_WEBHOOK_AUDIT_SENSITIVE is
#   restricted to Architecture/Vault/Vault.Rotation/Audit and is deliberately NOT
#   exposed to this public repo (ADR-0084 D4). So the #audit-sensitive mirror is
#   NOT emitted from here — it belongs to a private-repo emitter or the ADR-0086
#   runner (which resolves its webhooks from Key Vault). The SEV-2 incident PR
#   this workflow files is itself the durable audit trail.
#   Only credential NAMES + the timeframe are posted, never values or dates
#   (ADR-0084 D8 / Invariant 8 — the redaction pre-check in job-discord-notify
#   is the enforcement point). A failure of THIS scheduled workflow also notifies
#   #ops-alerts (scheduled-workflow-failure row in ADR-0084 D6).
#
# Notes:
#   - Authenticates with CREDENTIALS_CHECK_TOKEN, a dedicated fine-grained PAT
#     scoped to HoneyDrunk.Architecture (Issues/Contents/Pull-requests RW). Because
#     this workflow IS the credential-drift watcher, it cannot nag about its own
#     token's expiry — a silent CREDENTIALS_CHECK_TOKEN lapse stops the watcher, so
#     the run-summary heartbeat + grid-health watch entry are the mitigation, and the
#     token's own inventory row flags "rotate proactively." (Replaces the never-
#     provisioned GH_ISSUE_TOKEN the seed assumed; see ADR-0083 reconciliation.)
# ==============================================================================

name: External Credentials Drift Check

on:
  schedule:
    # 13:00 UTC == 09:00 EDT / 08:00 EST. The T-30/T-7/T+0 thresholds are
    # day-grained, so the 1-hour seasonal shift is irrelevant.
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: read   # checkout the Actions repo (scripts). Every cross-repo issue/PR
                   # operation uses CREDENTIALS_CHECK_TOKEN, not this workflow's GITHUB_TOKEN,
                   # so no issues:write is required on this repo's token.

# Serialize runs: a scheduled tick and a manual run must not race between the
# idempotency checks and the git push (which would double-escalate). Do not
# cancel an in-progress run mid-escalation.
concurrency:
  group: external-credentials-check
  cancel-in-progress: false

jobs:
  check-credentials:
    runs-on: ubuntu-latest
    outputs:
      # Per-tier credential-name summaries for the Discord notify jobs below.
      # Empty string => that tier had no rows => its notify job is skipped.
      t30: ${{ steps.discord-summary.outputs.t30 }}
      t7: ${{ steps.discord-summary.outputs.t7 }}
      t0: ${{ steps.discord-summary.outputs.t0 }}
    steps:
      - name: Verify CREDENTIALS_CHECK_TOKEN is present
        env:
          CREDENTIALS_CHECK_TOKEN: ${{ secrets.CREDENTIALS_CHECK_TOKEN }}
        run: |
          if [ -z "$CREDENTIALS_CHECK_TOKEN" ]; then
            echo "::error::CREDENTIALS_CHECK_TOKEN is not set. This workflow needs it to read the inventory in HoneyDrunk.Architecture and manage rotation issues. Bind the secret to this repo (or repoint the workflow at a valid token)." >&2
            exit 1
          fi

      - name: Checkout HoneyDrunk.Architecture (inventory source)
        uses: actions/checkout@v5
        with:
          repository: HoneyDrunkStudios/HoneyDrunk.Architecture
          token: ${{ secrets.CREDENTIALS_CHECK_TOKEN }}
          # persist-credentials stays at the default (true) ON PURPOSE: the T+0
          # path pushes an incident branch from this checkout via git, which needs
          # the token persisted in the local git config. The Actions checkout below
          # turns it off because it never pushes.
          path: architecture

      - name: Checkout HoneyDrunk.Actions (scripts)
        uses: actions/checkout@v5
        with:
          persist-credentials: false   # scripts-only; never pushes — shrink the surface
          path: actions

      # No setup-python step: ubuntu-latest ships python3 (3.12), and avoiding a
      # new third-party action pin keeps docs/action-pins.md unchanged.

      - name: Schema-check the inventory table
        run: |
          python3 actions/.github/scripts/inventory-schema-check.py \
            architecture/infrastructure/reference/sensitive-inventory.md

      - name: Parse and evaluate Rotates:yes rows
        run: |
          python3 actions/.github/scripts/inventory-evaluate.py \
            architecture/infrastructure/reference/sensitive-inventory.md \
            > escalations.json
          # Do not `cat` the file — it would print credential names + expiration
          # dates into the Actions log. The run summary (last step) reports state.

      - name: Apply T-30 escalations (urgent label + comment)
        env:
          GH_TOKEN: ${{ secrets.CREDENTIALS_CHECK_TOKEN }}
        run: |
          python3 actions/.github/scripts/inventory-escalate.py \
            --tier urgent_T30 --escalations escalations.json

      - name: Apply T-7 escalations (imminent label + comment)
        env:
          GH_TOKEN: ${{ secrets.CREDENTIALS_CHECK_TOKEN }}
        run: |
          python3 actions/.github/scripts/inventory-escalate.py \
            --tier imminent_T7 --escalations escalations.json

      - name: Apply T+0 escalations (SEV-2 incident PR + comment)
        env:
          GH_TOKEN: ${{ secrets.CREDENTIALS_CHECK_TOKEN }}
        run: |
          python3 actions/.github/scripts/inventory-escalate.py \
            --tier expired_T0 --escalations escalations.json \
            --architecture-checkout architecture

      - name: Summarize escalations for Discord (names only, no dates/values)
        id: discord-summary
        run: |
          # Emit, per tier, a comma-separated list of credential NAMES that
          # crossed the threshold. Names are safe per ADR-0084 D8 (only values
          # and dates are forbidden); job-discord-notify's redaction pre-check is
          # the backstop. Empty output => downstream notify job is skipped.
          #
          # Names are STRICTLY VALIDATED against ^[A-Za-z0-9_-]+$ before being
          # written, for two reasons (both raised in review):
          #   1. GITHUB_OUTPUT injection — a name containing a newline could
          #      forge arbitrary step outputs. The charset has no newline, so a
          #      validated name is injection-safe; we still write via the
          #      delimiter form as defence-in-depth.
          #   2. Payload hygiene — a malformed inventory row whose "name" is a
          #      value/sentence rather than an identifier is dropped (and flagged
          #      to the log) rather than posted to Discord.
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, re, sys
          NAME_RE = re.compile(r"^[A-Za-z0-9_-]+$")
          with open("escalations.json", encoding="utf-8") as fh:
              rows = json.load(fh)
          tiers = {"urgent_T30": "t30", "imminent_T7": "t7", "expired_T0": "t0"}
          for tier, key in tiers.items():
              names = []
              for r in rows:
                  if r.get("escalation_tier") != tier:
                      continue
                  name = r.get("name", "")
                  if NAME_RE.match(name):
                      names.append(name)
                  else:
                      # Never emit a non-identifier name; surface it instead.
                      sys.stderr.write(
                          f"::warning::skipping inventory row with non-identifier "
                          f"name (tier {tier}); fix the inventory 'Name' cell.\n")
              # Cap the rendered list so a pathological inventory can't bloat the
              # title; job-discord-notify also truncates, this just keeps it tidy.
              shown = ", ".join(names[:10])
              if len(names) > 10:
                  shown += f" (+{len(names) - 10} more)"
              # Single-line by construction (validated charset). Plain key=value
              # is safe; no multiline delimiter needed.
              print(f"{key}={shown}")
          PY

      - name: Summary (+ heartbeat)
        if: always()
        run: |
          python3 actions/.github/scripts/inventory-summary.py escalations.json \
            >> "$GITHUB_STEP_SUMMARY"

  # ----------------------------------------------------------------------------
  # Discord escalation routing (ADR-0084 D6). Each notify job is gated on its
  # tier having at least one credential. Multi-channel tiers (T-7, T+0) use one
  # job per channel. All route through the canonical seam (ADR-0084 D11).
  # ----------------------------------------------------------------------------

  notify-t30:
    needs: check-credentials
    # always() so the condition still evaluates if an unrelated later step in
    # check-credentials failed after the escalations/summary were computed — a
    # bare `outputs.x != ''` gate would be skipped on any upstream failure,
    # silently dropping an escalation that was actually due.
    if: ${{ always() && needs.check-credentials.outputs.t30 != '' }}
    uses: ./.github/workflows/job-discord-notify.yml
    with:
      channel: ops-alerts
      severity: medium
      title: "🔑 ${{ needs.check-credentials.outputs.t30 }} expires in ≤30 days"
      body: "Rotate per the credential's walkthrough under HoneyDrunk.Architecture/infrastructure/walkthroughs/. Standing rotation issues carry the dates."
      link: "https://github.com/HoneyDrunkStudios/HoneyDrunk.Architecture/issues?q=is%3Aissue+is%3Aopen+label%3Aexternal-credential-rotation"
    secrets: inherit

  notify-t7-ops:
    needs: check-credentials
    if: ${{ always() && needs.check-credentials.outputs.t7 != '' }}
    uses: ./.github/workflows/job-discord-notify.yml
    with:
      channel: ops-alerts
      severity: high
      title: "🔑⚠️ ${{ needs.check-credentials.outputs.t7 }} expires in ≤7 days"
      body: "Rotate now per the credential's walkthrough. Standing rotation issues carry the dates."
      link: "https://github.com/HoneyDrunkStudios/HoneyDrunk.Architecture/issues?q=is%3Aissue+is%3Aopen+label%3Aexternal-credential-rotation"
    secrets: inherit

  notify-t7-security:
    needs: check-credentials
    if: ${{ always() && needs.check-credentials.outputs.t7 != '' }}
    uses: ./.github/workflows/job-discord-notify.yml
    with:
      channel: security-alerts
      severity: high
      title: "🔑⚠️ ${{ needs.check-credentials.outputs.t7 }} expires in ≤7 days"
      body: "Rotate now per the credential's walkthrough. Standing rotation issues carry the dates."
      link: "https://github.com/HoneyDrunkStudios/HoneyDrunk.Architecture/issues?q=is%3Aissue+is%3Aopen+label%3Aexternal-credential-rotation"
    secrets: inherit

  # T+0 routes only to #security-alerts here. ADR-0084 D6 also lists
  # #audit-sensitive for T+0, but ADR-0084 D4 deliberately restricts
  # DISCORD_WEBHOOK_AUDIT_SENSITIVE to Architecture/Vault/Vault.Rotation/Audit and
  # does NOT expose it to this public repo — so an audit-sensitive notify from
  # here would fail secret resolution every run. The audit-sensitive mirror is
  # owned by an authorized private-repo emitter or the ADR-0086 runner (which
  # resolves its webhook from kv-hd-automation-dev). The SEV-2 incident PR this
  # workflow files is itself the durable audit trail. This is a documented D4-vs-D6
  # reconciliation, not a silent drop.
  notify-t0-security:
    needs: check-credentials
    if: ${{ always() && needs.check-credentials.outputs.t0 != '' }}
    uses: ./.github/workflows/job-discord-notify.yml
    with:
      channel: security-alerts
      severity: critical
      title: "🔑🔥 ${{ needs.check-credentials.outputs.t0 }} EXPIRED"
      body: "A SEV-2 incident record has been filed. Rotate immediately per the credential's walkthrough."
      link: "https://github.com/HoneyDrunkStudios/HoneyDrunk.Architecture/issues?q=is%3Aissue+is%3Aopen+label%3Aexternal-credential-rotation"
    secrets: inherit

  notify-workflow-failure:
    needs: check-credentials
    # Scheduled-workflow-failure row (ADR-0084 D6): if the drift check itself
    # fails, the operator must hear about it — a silent watcher is the failure
    # mode ADR-0083's heartbeat note calls out.
    if: ${{ always() && needs.check-credentials.result == 'failure' }}
    uses: ./.github/workflows/job-discord-notify.yml
    with:
      channel: ops-alerts
      severity: medium
      title: "🕒❌ external-credentials-check (daily) failed"
      body: "The scheduled credential-drift watcher failed before completing. Credential expiry may be going unmonitored until this is fixed."
      link: "https://github.com/HoneyDrunkStudios/HoneyDrunk.Actions/actions/workflows/external-credentials-check.yml"
    secrets: inherit

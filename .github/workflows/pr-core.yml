# ==============================================================================
# PR Core Workflow
# ==============================================================================
# Purpose:
#   Fast, minimal PR validation for most repos in the HoneyDrunk Grid.
#   Designed to be a required check that provides quick feedback on PRs.
#
# Responsibilities:
#   - Orchestrate build, test, and analysis jobs
#   - Coordinate PR validation workflow
#   - Generate PR summary
#
# Single Responsibility:
#   Orchestration only - delegates to job-level workflows
#
# Non-goals:
#   - Deep security scans (use nightly-security.yml)
#   - Full site crawls (use nightly-accessibility.yml)
#   - Organization-wide checks (use weekly-governance.yml)
#
# Triggers:
#   - This workflow is reusable via workflow_call
#   - Consuming repos should trigger it on pull_request events
#
# Usage Example:
#   See docs/consumer-usage.md for sample consumer workflows
# ==============================================================================

name: PR Core

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: 'The .NET SDK version to use'
        required: false
        type: string
        default: '10.0.x'
      
      configuration:
        description: 'Build configuration (Debug or Release)'
        required: false
        type: string
        default: 'Release'
      
      runs-on:
        description: 'GitHub runner to use (ubuntu-latest, windows-latest, macos-latest)'
        required: false
        type: string
        default: 'ubuntu-latest'
      
      working-directory:
        description: 'Working directory for all operations'
        required: false
        type: string
        default: '.'
      
      project-path:
        description: 'Path to solution or project file (auto-detected if not specified)'
        required: false
        type: string
        default: ''
      
      enable-secret-scan:
        description: 'Run secret scanning on PR diff'
        required: false
        type: boolean
        default: true

      enable-dependency-scan:
        description: 'Run vulnerable-package scan (dotnet list <target> package --vulnerable --include-transitive --format json)'
        required: false
        type: boolean
        default: true

      dependency-fail-on-severity:
        description: 'Minimum vulnerability severity that fails the PR (critical, high, moderate, low, none)'
        required: false
        type: string
        default: 'high'

      enable-codeql:
        description: 'Run CodeQL SAST / code-quality scan on the PR'
        required: false
        type: boolean
        default: true

      codeql-queries:
        description: 'CodeQL query suite to run (security-and-quality, security-extended, security)'
        required: false
        type: string
        default: 'security-and-quality'

      codeql-fail-on-severity:
        description: 'Lowest SARIF severity that fails the PR (error, warning, note, none)'
        required: false
        type: string
        default: 'note'

      enable-accessibility-check:
        description: 'Run minimal accessibility check (opt-in)'
        required: false
        type: boolean
        default: false

      patch-coverage-threshold:
        description: 'Minimum percent of added/changed executable lines that must be covered'
        required: false
        type: number
        default: 75

      absolute-coverage-floor:
        description: 'Flat Grid-wide minimum total line coverage percent'
        required: false
        type: number
        default: 70
      
      accessibility-url:
        description: 'URL to check for accessibility (required if enable-accessibility-check is true)'
        required: false
        type: string
        default: ''
      
      post-pr-summary:
        description: 'Post results summary to PR as comment'
        required: false
        type: boolean
        default: true
      
      actions-ref:
        description: 'Git ref of HoneyDrunk.Actions to use (main, tag, or commit)'
        required: false
        type: string
        default: 'main'
    
    secrets:
      github-token:
        description: 'GitHub token for PR comments and API access'
        required: false

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # Job 1: Build and Test
  build-and-test:
    name: Build and Test
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/job-build-and-test.yml@main
    with:
      dotnet-version: ${{ inputs.dotnet-version }}
      configuration: ${{ inputs.configuration }}
      runs-on: ${{ inputs.runs-on }}
      working-directory: ${{ inputs.working-directory }}
      project-path: ${{ inputs.project-path }}
      enable-cache: true
      collect-coverage: true
      actions-ref: ${{ inputs.actions-ref }}
    permissions:
      contents: read
      checks: write
  
  # Job 2: Static Analysis
  static-analysis:
    name: Static Analysis
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/job-static-analysis.yml@main
    with:
      dotnet-version: ${{ inputs.dotnet-version }}
      runs-on: ${{ inputs.runs-on }}
      working-directory: ${{ inputs.working-directory }}
      project-path: ${{ inputs.project-path }}
      check-formatting: true
      fail-on-formatting-issues: false  # Warn only in PR
      validate-test-naming: true
      actions-ref: ${{ inputs.actions-ref }}
    permissions:
      contents: read
  
  # Job 3: Secret Scan (Optional)
  secret-scan:
    name: Secret Scan (Diff Only)
    if: ${{ inputs.enable-secret-scan }}
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/job-secret-scan.yml@main
    with:
      runs-on: ${{ inputs.runs-on }}
      scan-mode: 'diff-only'

  # Job 4: Dependency Vulnerability Scan (Optional)
  dependency-scan:
    name: Dependency Scan
    if: ${{ inputs.enable-dependency-scan }}
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/job-dependency-scan.yml@main
    with:
      dotnet-version: ${{ inputs.dotnet-version }}
      runs-on: ${{ inputs.runs-on }}
      working-directory: ${{ inputs.working-directory }}
      project-path: ${{ inputs.project-path }}
      fail-on-severity: ${{ inputs.dependency-fail-on-severity }}
      actions-ref: ${{ inputs.actions-ref }}
    permissions:
      contents: read

  # Job 5: CodeQL SAST / Code-Quality (Optional)
  codeql:
    name: CodeQL
    if: ${{ inputs.enable-codeql }}
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/job-codeql.yml@main
    with:
      dotnet-version: ${{ inputs.dotnet-version }}
      runs-on: ${{ inputs.runs-on }}
      working-directory: ${{ inputs.working-directory }}
      project-path: ${{ inputs.project-path }}
      queries: ${{ inputs.codeql-queries }}
      fail-on-severity: ${{ inputs.codeql-fail-on-severity }}
      actions-ref: ${{ inputs.actions-ref }}
    permissions:
      contents: read
      security-events: write

  # Job 6: Accessibility Check (Optional)
  accessibility-check:
    name: Minimal Accessibility Check
    if: ${{ inputs.enable-accessibility-check }}
    runs-on: ${{ inputs.runs-on }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Validate accessibility URL provided
        if: ${{ inputs.accessibility-url == '' }}
        shell: bash
        run: |
          echo "::error::accessibility-url input is required when enable-accessibility-check is true"
          exit 1
      
      - name: Checkout HoneyDrunk.Actions
        uses: actions/checkout@v5
        with:
          repository: HoneyDrunkStudios/HoneyDrunk.Actions
          path: .github/actions-repo
          ref: ${{ inputs.actions-ref }}

      - name: Run minimal accessibility check
        uses: ./.github/actions-repo/.github/actions/accessibility/scan
        with:
          base-url: ${{ inputs.accessibility-url }}
          routes: '/'
          scan-mode: 'minimal'
          wcag-level: 'AA'
  
  # Job 7: Authorship Check (ADR-0044 D6)
  authorship-check:
    name: Authorship Check
    runs-on: ${{ inputs.runs-on }}
    outputs:
      authorship: ${{ steps.parse.outputs.authorship }}
    steps:
      - name: Parse Authorship line
        id: parse
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os, re, sys
          from pathlib import Path

          body = os.environ.get('PR_BODY') or ''
          allowed = {'human', 'agent-codex', 'agent-copilot', 'agent-claude-code', 'mixed'}
          matches = []
          for line in body.splitlines():
              m = re.match(r'^\s*Authorship:\s*([^\s#]+)\s*$', line)
              if m:
                  matches.append(m.group(1).strip())

          out = Path(os.environ['GITHUB_OUTPUT'])
          if len(matches) != 1:
              print('::error::PR body must contain exactly one line: Authorship: <class>')
              print('::error::Allowed classes: human, agent-codex, agent-copilot, agent-claude-code, mixed')
              sys.exit(1)

          authorship = matches[0]
          if authorship not in allowed:
              print(f'::error::Invalid Authorship value: {authorship}')
              print('::error::Allowed classes: human, agent-codex, agent-copilot, agent-claude-code, mixed')
              sys.exit(1)

          with out.open('a', encoding='utf-8') as f:
              f.write(f'authorship={authorship}\n')
          print(f'Authorship: {authorship}')
          PY


  # Job 8: PR Metadata Check (ADR-0011 / ADR-0044)
  pr-metadata-check:
    name: PR Metadata Check
    needs: [authorship-check]
    if: ${{ always() && needs.authorship-check.result == 'success' }}
    runs-on: ${{ inputs.runs-on }}
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Validate packet metadata and out-of-band label
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github-token || github.token }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          AUTHORSHIP: ${{ needs.authorship-check.outputs.authorship }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os, re, subprocess, sys

          body = os.environ.get('PR_BODY') or ''
          authorship = os.environ.get('AUTHORSHIP') or ''
          repo = os.environ['REPOSITORY']
          pr_number = os.environ['PR_NUMBER']

          def meaningful(value: str) -> bool:
              value = (value or '').strip()
              if not value:
                  return False
              normalized = re.sub(r'[*_`\s]+', ' ', value).strip().lower()
              placeholders = {
                  '-', 'n/a', 'na', 'none', 'todo', 'tbd', 'not applicable',
                  'n/a (required for agent/mixed prs unless out-of-band reason is set)'
              }
              return normalized not in placeholders

          def field_value(names):
              pattern = re.compile(r'^\s*(?:' + '|'.join(re.escape(n) for n in names) + r')\s*:\s*(.*?)\s*$', re.IGNORECASE)
              for line in body.splitlines():
                  match = pattern.match(line)
                  if match and meaningful(match.group(1)):
                      return match.group(1).strip()
              return ''

          def section_value(title):
              lines = body.splitlines()
              in_section = False
              found = []
              for line in lines:
                  if re.match(r'^\s*##+\s+', line):
                      heading = re.sub(r'^\s*##+\s+', '', line).strip().lower()
                      if in_section and heading != title.lower():
                          break
                      in_section = heading == title.lower()
                      continue
                  if in_section and meaningful(line.lstrip('- ').strip()):
                      found.append(line.lstrip('- ').strip())
              return '\n'.join(found).strip()

          packet = field_value(['Packet', 'Issue Packet']) or section_value('Issue Packet') or section_value('Packet')
          out_of_band_reason = field_value(['Out-of-band reason', 'Out of band reason']) or section_value('Out-of-band reason') or section_value('Out of band reason')
          has_packet = bool(packet)
          has_oob_reason = bool(out_of_band_reason)

          if authorship in {'agent-codex', 'agent-copilot', 'agent-claude-code', 'mixed'}:
              if has_packet and has_oob_reason:
                  print('::error::Agent/mixed PR declares both Packet and Out-of-band reason. Use exactly one.')
                  sys.exit(1)
              if not has_packet and not has_oob_reason:
                  print('::error::Agent/mixed PRs must include Packet metadata, or an explicit Out-of-band reason.')
                  print('::error::Do not silently rely on the out-of-band label; make the degraded context visible in the PR body.')
                  sys.exit(1)
          elif has_oob_reason and has_packet:
              print('::error::PR declares both Packet and Out-of-band reason. Use exactly one.')
              sys.exit(1)

          def gh(*args, check=True):
              result = subprocess.run(['gh', *args], text=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE)
              if check and result.returncode != 0:
                  print(result.stdout, end='')
                  print(result.stderr, end='', file=sys.stderr)
                  sys.exit(result.returncode)
              return result

          labels_stdout = gh('pr', 'view', pr_number, '--repo', repo, '--json', 'labels', '--jq', '.labels[].name').stdout
          labels = {line.strip() for line in labels_stdout.splitlines() if line.strip()}
          has_label = 'out-of-band' in labels

          if has_oob_reason and not has_label:
              gh('pr', 'edit', pr_number, '--repo', repo, '--add-label', 'out-of-band')
              print('Added out-of-band label because the PR declares an Out-of-band reason.')
          elif has_packet and has_label:
              gh('pr', 'edit', pr_number, '--repo', repo, '--remove-label', 'out-of-band')
              print('Removed out-of-band label because Packet metadata is present.')
          elif has_oob_reason:
              print('Out-of-band reason present and label already applied.')
          elif has_packet:
              print('Packet metadata present; out-of-band label not needed.')
          else:
              print('Human-authored PR without packet metadata; out-of-band label not required.')
          PY

  # Job 9: NuGet Package Version Consistency Check
  #
  # When a PR bumps the <Version> of any NuGet-publishing .csproj (i.e. a project
  # with a <PackageId>), this check enforces:
  #
  #   1. ALL NuGet-publishing csproj files in the repo carry the same <Version>
  #      (no drift between, e.g., HoneyDrunk.Kernel.csproj and
  #      HoneyDrunk.Kernel.Abstractions.csproj).
  #   2. Every NuGet-publishing csproj's per-package CHANGELOG.md (the one in
  #      the same directory) has a `## [<new-version>]` heading — not just
  #      content under `## [Unreleased]`.
  #   3. The repo-level CHANGELOG.md (the one sitting next to a .slnx) also has
  #      a `## [<new-version>]` heading.
  #
  # Rationale: HoneyDrunk's publish pipeline auto-generates GitHub Release notes
  # by awk-extracting the `## [VERSION]` section from the repo-level CHANGELOG.
  # If that heading doesn't exist, the `Create GitHub Release` job silently
  # fails after NuGet publish has already succeeded — leaving consumers with a
  # released package and no migration notes. Multi-project drift creates a
  # similar split-brain. This gate refuses the PR up front instead of catching
  # the problem at release time.
  #
  # No-op for repos with zero NuGet-publishing csproj files.
  # No-op when the PR doesn't touch any <Version> element.
  nuget-version-consistency-check:
    name: NuGet Version Consistency Check
    needs: [authorship-check]
    if: ${{ always() && needs.authorship-check.result == 'success' }}
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check NuGet package version + CHANGELOG consistency
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os, re, subprocess, sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          base_sha = os.environ.get('BASE_SHA') or ''
          head_sha = os.environ.get('HEAD_SHA') or 'HEAD'
          repo_root = Path('.').resolve()

          def strip_ns(tag):
              return tag.split('}', 1)[1] if tag.startswith('{') else tag

          def find_text(element, child_name):
              for child in element.iter():
                  if strip_ns(child.tag) == child_name and child.text:
                      return child.text.strip()
              return None

          # 1. Discover NuGet-publishing csproj files (have <PackageId>).
          #    Inline <Version> is optional — many Grid repos centralize versioning
          #    in Directory.Build.props (no <Version> appears in any .csproj). Treat
          #    csprojs without an inline <Version> as "not version-pinned here" and
          #    skip them for parity / CHANGELOG validation; only check inline-versioned
          #    csprojs.
          nuget_csprojs = []           # Every csproj with <PackageId>.
          inline_versioned = []        # Subset with an inline <Version>.
          for csproj in repo_root.rglob('*.csproj'):
              parts = {p.lower() for p in csproj.parts}
              if 'bin' in parts or 'obj' in parts or 'node_modules' in parts:
                  continue
              if csproj.name.endswith('.Tests.csproj') or csproj.name.endswith('.Canary.csproj'):
                  continue
              try:
                  tree = ET.parse(csproj)
              except ET.ParseError:
                  continue
              package_id = find_text(tree.getroot(), 'PackageId')
              if not package_id:
                  continue
              version = find_text(tree.getroot(), 'Version')
              nuget_csprojs.append((csproj, package_id, version))
              if version:
                  inline_versioned.append((csproj, package_id, version))

          if not nuget_csprojs:
              print('::notice::No NuGet-publishing csproj files found; skipping version consistency check')
              sys.exit(0)

          # 2. Detect <Version> changes scoped to NuGet-publishing csprojs only.
          #    The parity + CHANGELOG checks are gated on this — we don't flag
          #    pre-existing drift on PRs that don't touch versions. Test projects
          #    and non-NuGet projects don't trigger the gate even if their files
          #    happen to add a <Version> line.
          if not base_sha:
              print('::notice::No base SHA (push event); skipping diff-based bump checks')
              sys.exit(0)

          nuget_paths = {str(c.relative_to(repo_root)).replace(os.sep, '/') for c, _, _ in nuget_csprojs}

          subprocess.run(['git', 'fetch', '--no-tags', 'origin', base_sha, head_sha],
                         check=False, capture_output=True)
          # text=False + manual decode with errors='replace' tolerates non-UTF-8
          # bytes in the diff output (e.g. a Latin-1 byte in a docstring that the
          # PR removes). The gate only cares about +/- <Version> lines and file
          # headers, so lossy decoding of unrelated content is harmless.
          diff = subprocess.run(['git', 'diff', '--unified=0', f'{base_sha}...{head_sha}'],
                                capture_output=True).stdout.decode('utf-8', errors='replace')

          version_bumped = False
          current_file = None
          for raw in diff.splitlines():
              if raw.startswith('+++ b/'):
                  current_file = raw[6:]
              elif current_file and current_file in nuget_paths and re.match(r'^\+\s*<Version>', raw):
                  version_bumped = True
                  break

          if not version_bumped:
              print('::notice::No <Version> changes in NuGet-publishing csproj files; check is a no-op')
              sys.exit(0)

          # 3. Version bumped — assert parity across inline-versioned NuGet csprojs.
          versions = {v for (_, _, v) in inline_versioned}
          if not versions:
              print('::error::<Version> bump detected in a NuGet-publishing csproj but no project has a resolved inline <Version> to validate. This usually means a bump landed in a Directory.Build.props centralizer alongside this csproj edit. Pick one strategy (central or per-project) and remove the half-step.')
              sys.exit(1)
          if len(versions) > 1:
              print(f'::error::Version drift across NuGet-publishing csproj files: {sorted(versions)}')
              for csproj, pid, ver in inline_versioned:
                  print(f'::error::  {csproj.relative_to(repo_root)} ({pid}): {ver}')
              print('::error::All NuGet packages in this repo with an inline <Version> must share the same value.')
              sys.exit(1)

          current_version = next(iter(versions))
          print(f'::notice::Inline-versioned NuGet packages at common version: {current_version}')

          # 4. Every relevant CHANGELOG must have the version heading.
          version_heading = re.compile(rf'^##\s*\[{re.escape(current_version)}\]', re.MULTILINE)
          failures = []

          # Per-package CHANGELOGs — only check the ones for csprojs that pin
          # their version inline (i.e. the ones we just validated for parity).
          for csproj, pid, ver in inline_versioned:
              changelog = csproj.parent / 'CHANGELOG.md'
              if not changelog.exists():
                  failures.append(f'Per-package CHANGELOG missing: {changelog.relative_to(repo_root)} (package {pid})')
                  continue
              content = changelog.read_text(encoding='utf-8')
              if not version_heading.search(content):
                  failures.append(f'{changelog.relative_to(repo_root)} (package {pid}) is missing a `## [{current_version}]` heading — entries under `## [Unreleased]` do not satisfy this gate')

          # Repo-level CHANGELOG: the one sitting next to a .slnx (the publish
          # pipeline's release-notes generator reads only this one when it exists).
          slnx_files = [
              s for s in repo_root.rglob('*.slnx')
              if '.vs' not in s.parts and 'bin' not in s.parts and 'obj' not in s.parts
          ]
          for slnx in slnx_files:
              repo_changelog = slnx.parent / 'CHANGELOG.md'
              if not repo_changelog.exists():
                  continue
              content = repo_changelog.read_text(encoding='utf-8')
              if not version_heading.search(content):
                  failures.append(f'{repo_changelog.relative_to(repo_root)} (next to {slnx.name}) is missing a `## [{current_version}]` heading — the release-notes generator awk-greps for this exact heading at tag-push time')

          if failures:
              print(f'::error::Version bump to {current_version} is incomplete:')
              for f in failures:
                  print(f'::error::  - {f}')
              print(f'::error::Required: when bumping <Version> in any NuGet-publishing csproj, every per-package CHANGELOG and the repo-level CHANGELOG (next to .slnx) must carry a `## [{current_version}]` heading. A date suffix (`- YYYY-MM-DD`) is recommended per Keep-a-Changelog but the gate accepts the heading with or without it. Move released content out of `## [Unreleased]` (Keep-a-Changelog freeze-at-release pattern).')
              sys.exit(1)

          print(f'::notice::Version bump to {current_version} consistent across all NuGet packages and CHANGELOGs')
          PY

  # Job 10: PR Size Check (ADR-0044 D7, warnings-only in Phase 2)
  pr-size-check:
    name: PR Size Check
    needs: [authorship-check, pr-metadata-check]
    if: ${{ always() && needs.authorship-check.result == 'success' && needs.pr-metadata-check.result == 'success' && needs.authorship-check.outputs.authorship != 'human' }}
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute non-test changed lines
        id: size
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import fnmatch, os, re, subprocess
          from pathlib import Path

          base = os.environ.get('BASE_SHA') or ''
          head = os.environ.get('HEAD_SHA') or 'HEAD'
          out = Path(os.environ['GITHUB_OUTPUT'])

          def emit(key, value):
              with out.open('a', encoding='utf-8') as f:
                  f.write(f'{key}={value}\n')

          def load_skip_paths():
              config = Path('.honeydrunk-review.yaml')
              if not config.exists():
                  print('No .honeydrunk-review.yaml found; skip_paths defaults to empty.')
                  return []
              lines = config.read_text(encoding='utf-8').splitlines()
              skips = []
              in_skip = False
              key_indent = None
              item_indent = None
              for raw in lines:
                  stripped = raw.strip()
                  if not stripped or stripped.startswith('#'):
                      continue
                  current_indent = len(raw) - len(raw.lstrip())
                  if re.match(r'^skip_paths\s*:', stripped):
                      in_skip = True
                      key_indent = current_indent
                      item_indent = None
                      rest = stripped.split(':', 1)[1].strip()
                      if rest and rest not in ('[]',):
                          rest = rest.strip('[]')
                          skips.extend(x.strip().strip('"\'') for x in rest.split(',') if x.strip())
                      continue
                  if in_skip:
                      if current_indent <= (key_indent or 0):
                          break
                      if not stripped.startswith('-'):
                          continue
                      if item_indent is None:
                          item_indent = current_indent
                      if current_indent != item_indent:
                          continue
                      skips.append(stripped[1:].strip().strip('"\''))
              print(f'Loaded {len(skips)} skip_path pattern(s).')
              return [s for s in skips if s]

          def is_test_path(path):
              p = path.replace('\\', '/')
              lower = p.lower()
              return (
                  '/test/' in lower or '/tests/' in lower or
                  '.tests/' in lower or '.tests.' in lower or
                  '.canary/' in lower or '.canary.' in lower or
                  lower.endswith('test.cs') or lower.endswith('tests.cs') or
                  lower.endswith('.spec.ts') or lower.endswith('.test.ts')
              )

          def is_skipped(path, patterns):
              p = path.replace('\\', '/')
              return any(fnmatch.fnmatch(p, pattern) for pattern in patterns)

          if base:
              subprocess.run(['git', 'fetch', '--no-tags', 'origin', base, head], check=False, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              diff_range = f'{base}...{head}'
          else:
              diff_range = 'HEAD~1...HEAD'

          diff = subprocess.run(['git', 'diff', '--numstat', diff_range], stdout=subprocess.PIPE, stderr=subprocess.PIPE)
          if diff.returncode != 0:
              print('::warning::Could not compute PR size diff: ' + diff.stderr.decode('utf-8', errors='replace').strip())
              emit('changed_lines', '0')
              emit('size_band', 'unknown')
              raise SystemExit(0)

          skip_patterns = load_skip_paths()
          changed = 0
          for line in diff.stdout.decode('utf-8', errors='replace').splitlines():
              parts = line.split('\t')
              if len(parts) < 3:
                  continue
              added, deleted, path = parts[0], parts[1], parts[2]
              if added == '-' or deleted == '-':
                  continue
              if is_test_path(path) or is_skipped(path, skip_patterns):
                  continue
              changed += int(added) + int(deleted)

          if changed <= 400:
              band = 'normal'
          elif changed <= 800:
              band = 'large'
          else:
              band = 'oversize'
          emit('changed_lines', str(changed))
          emit('size_band', band)
          print(f'Non-test changed lines: {changed} ({band})')
          PY

      - name: Check size justification
        id: justification
        if: ${{ steps.size.outputs.size_band == 'large' || steps.size.outputs.size_band == 'oversize' }}
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: |
          set -euo pipefail
          if printf '%s\n' "$PR_BODY" | grep -Eiq '^Size justification:'; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply large-pr label
        if: ${{ steps.size.outputs.size_band == 'large' || steps.size.outputs.size_band == 'oversize' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.github-token || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          gh label create large-pr \
            --repo "$GITHUB_REPOSITORY" \
            --color fbca04 \
            --description "Non-human-authored PR exceeds ADR-0044 size guidance and needs review attention." \
            2>/dev/null || true
          gh issue edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label large-pr

      - name: Comment on large PR missing justification
        if: ${{ steps.size.outputs.size_band == 'large' && steps.justification.outputs.present != 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.github-token || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CHANGED_LINES: ${{ steps.size.outputs.changed_lines }}
        shell: bash
        run: |
          set -euo pipefail
          cat > pr-size-comment.md <<EOF
          ADR-0044 PR-size discipline: this non-human-authored PR changes ${CHANGED_LINES} non-test lines.

          Please add a \`Size justification:\` block to the PR body explaining why this should remain one PR. Phase 2 is warnings-only; this check does not fail the PR.
          EOF
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file pr-size-comment.md

      - name: Comment on oversized PR
        if: ${{ steps.size.outputs.size_band == 'oversize' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.github-token || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CHANGED_LINES: ${{ steps.size.outputs.changed_lines }}
        shell: bash
        run: |
          set -euo pipefail
          cat > pr-size-comment.md <<EOF
          ADR-0044 PR-size discipline: this non-human-authored PR changes ${CHANGED_LINES} non-test lines.

          Please split the PR or run a \`refine\` pass before review if the size is not justified. Phase 2 is warnings-only; this check does not fail the PR.
          EOF
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file pr-size-comment.md

      # Phase 3 toggle point (ADR-0044 packet 14): change this warning-only job
      # to fail for size_band == 'oversize' when the Grid adopts the harder posture.

  # Job 10: PR Summary and Coverage Gate
  pr-summary:
    name: PR Summary and Coverage Gate
    needs: [build-and-test, static-analysis, secret-scan, dependency-scan, codeql, authorship-check, pr-metadata-check, nuget-version-consistency-check, pr-size-check]
    if: ${{ always() }}
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Checkout HoneyDrunk.Actions
        uses: actions/checkout@v5
        with:
          repository: HoneyDrunkStudios/HoneyDrunk.Actions
          path: .github/actions-repo
          ref: ${{ inputs.actions-ref }}
      
      - name: Download test results artifact (if exists)
        uses: actions/download-artifact@v7
        with:
          name: test-results-${{ inputs.runs-on }}
          path: TestResults
        continue-on-error: true
      
      - name: Download coverage reports artifact (if exists)
        uses: actions/download-artifact@v7
        with:
          name: coverage-reports-${{ inputs.runs-on }}
          path: TestResults
        continue-on-error: true
      
      - name: Coverage gate
        id: coverage-gate
        continue-on-error: true
        shell: bash
        env:
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          PROJECT_PATH: ${{ inputs.project-path }}
          PATCH_COVERAGE_THRESHOLD: ${{ inputs.patch-coverage-threshold }}
          ABSOLUTE_COVERAGE_FLOOR: ${{ inputs.absolute-coverage-floor }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          python3 <<'PY'
          import json, os, subprocess, sys, xml.etree.ElementTree as ET
          from pathlib import Path

          workdir = Path(os.environ.get('WORKING_DIRECTORY') or '.').resolve()
          threshold = float(os.environ.get('PATCH_COVERAGE_THRESHOLD') or 75)
          floor = float(os.environ.get('ABSOLUTE_COVERAGE_FLOOR') or 70)
          base_sha = os.environ.get('BASE_SHA') or ''
          head_sha = os.environ.get('HEAD_SHA') or 'HEAD'
          out = Path(os.environ['GITHUB_OUTPUT'])

          def emit(key, value):
              with out.open('a', encoding='utf-8') as f:
                  if '\n' in str(value):
                      f.write(f"{key}<<EOF\n{value}\nEOF\n")
                  else:
                      f.write(f"{key}={value}\n")

          def pct(v):
              return f"{v:.1f}".rstrip('0').rstrip('.')

          def is_test_or_canary(filename):
              normalized = filename.replace('\\', '/')
              return '.Tests' in normalized or '.Canary' in normalized

          def canonical_source_key(filename):
              path = Path(filename)
              candidates = [path]
              if not path.is_absolute():
                  candidates.append((workdir / path).resolve())
                  candidates.append(Path(path.as_posix().lstrip('/')).resolve())
              for candidate in candidates:
                  try:
                      resolved = candidate.resolve()
                  except OSError:
                      continue
                  if resolved.exists():
                      try:
                          return str(resolved.relative_to(workdir)).replace('\\', '/').lower()
                      except ValueError:
                          return str(resolved).replace('\\', '/').lower()
              return path.as_posix().lstrip('/').lower()

          test_projects = [p for p in workdir.rglob('*.csproj') if p.name.endswith('.Tests.csproj') or p.name.endswith('.Canary.csproj')]
          coverage_files = list(Path('TestResults').rglob('coverage.cobertura.xml'))
          line_hits = {}
          total_line_hits = {}
          # Branch and method coverage are display-only (the gate ratchets line
          # coverage only — see ADR-0011 D2). Tracking per-source-file with the
          # same canonical-key dedup as line coverage prevents double-counting
          # when multiple test projects share a source file.
          # Branches: canonical -> {line_no -> (max_covered, total)}
          total_branches = {}
          # Methods: canonical -> {method_signature -> any_hits}
          total_methods = {}
          covered_assemblies = set()
          import re

          for cov in coverage_files:
              try:
                  root = ET.parse(cov).getroot()
              except ET.ParseError:
                  continue
              for cls in root.findall('.//class'):
                  filename = cls.attrib.get('filename') or ''
                  if not filename:
                      continue
                  include_in_total = not is_test_or_canary(filename)
                  if include_in_total:
                      covered_assemblies.add(filename)
                  path = Path(filename)
                  candidates = [path]
                  if not path.is_absolute():
                      candidates.append((workdir / path).resolve())
                      candidates.append(Path(path.as_posix().lstrip('/')).resolve())
                  normalized = {str(c).replace('\\', '/').lower() for c in candidates}
                  canonical = canonical_source_key(filename) if include_in_total else None
                  for line in cls.findall('.//line'):
                      try:
                          num = int(line.attrib.get('number', '0'))
                          hits = int(line.attrib.get('hits', '0'))
                      except ValueError:
                          continue
                      for key in normalized:
                          line_hits.setdefault(key, {})[num] = max(line_hits.setdefault(key, {}).get(num, 0), hits)
                      if include_in_total:
                          total_line_hits.setdefault(canonical, {})[num] = max(total_line_hits.setdefault(canonical, {}).get(num, 0), hits)
                          # Branch coverage: lines with branch="true" carry a
                          # condition-coverage="X% (covered/total)" attribute.
                          if line.attrib.get('branch', '').lower() == 'true':
                              cc = line.attrib.get('condition-coverage', '')
                              m = re.search(r'\((\d+)/(\d+)\)', cc)
                              if m:
                                  br_covered = int(m.group(1))
                                  br_total = int(m.group(2))
                                  prev = total_branches.setdefault(canonical, {}).get(num)
                                  if prev is None:
                                      total_branches[canonical][num] = (br_covered, br_total)
                                  else:
                                      total_branches[canonical][num] = (max(prev[0], br_covered), br_total)
                  if include_in_total:
                      # Method coverage: a method counts as covered if any of
                      # its <line> children have hits > 0 in any test project.
                      for method in cls.findall('.//method'):
                          sig = (method.attrib.get('name', ''), method.attrib.get('signature', ''))
                          any_hit = any(
                              int(line.attrib.get('hits', '0')) > 0
                              for line in method.findall('.//line')
                              if line.attrib.get('hits', '').lstrip('-').isdigit()
                          )
                          prev_hit = total_methods.setdefault(canonical, {}).get(sig, False)
                          total_methods[canonical][sig] = prev_hit or any_hit

          if not test_projects and not covered_assemblies:
              verdict = 'skipped (no test projects)'
              emit('verdict', verdict)
              emit('gate_failed', 'false')
              emit('summary_line', 'Coverage gate: skipped (no test projects)')
              sys.exit(0)

          total_valid = sum(len(lines) for lines in total_line_hits.values())
          total_covered = sum(1 for lines in total_line_hits.values() for hits in lines.values() if hits > 0)
          total_rate = (total_covered / total_valid * 100) if total_valid else 0.0

          # Branch coverage aggregate (display-only, not gated).
          branch_total = sum(t for branches in total_branches.values() for (_, t) in branches.values())
          branch_covered = sum(c for branches in total_branches.values() for (c, _) in branches.values())
          branch_rate = (branch_covered / branch_total * 100) if branch_total else 0.0

          # Method coverage aggregate (display-only, not gated).
          methods_total = sum(len(methods) for methods in total_methods.values())
          methods_covered = sum(1 for methods in total_methods.values() for hit in methods.values() if hit)
          method_rate = (methods_covered / methods_total * 100) if methods_total else 0.0

          patch_coverable = 0
          patch_covered = 0
          diff_error = None
          if base_sha:
              subprocess.run(['git', 'fetch', '--no-tags', 'origin', base_sha, head_sha], check=False, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              # text=False + manual decode tolerates non-UTF-8 bytes in the diff
              # (e.g. a Latin-1 char in a removed docstring); the patch-coverage
              # walker only inspects file headers and hunk markers.
              diff = subprocess.run(['git', 'diff', '--unified=0', f'{base_sha}...{head_sha}'], stdout=subprocess.PIPE, stderr=subprocess.PIPE)
              if diff.returncode != 0:
                  diff_error = diff.stderr.decode('utf-8', errors='replace').strip() or 'git diff failed'
              current_file = None
              diff_lines = [] if diff_error is not None else diff.stdout.decode('utf-8', errors='replace').splitlines()
              for raw in diff_lines:
                  if raw.startswith('+++ b/'):
                      current_file = raw[6:]
                  elif raw.startswith('@@') and current_file:
                      m = re.search(r'\+(\d+)(?:,(\d+))?', raw)
                      if not m:
                          continue
                      start = int(m.group(1)); count = int(m.group(2) or '1')
                      keys = []
                      fp = Path(current_file)
                      keys.append(str(fp).replace('\\','/').lower())
                      keys.append(str((Path.cwd()/fp).resolve()).replace('\\','/').lower())
                      keys.append(str((workdir/fp).resolve()).replace('\\','/').lower())
                      hits = {}
                      for k in keys:
                          hits.update(line_hits.get(k, {}))
                      for n in range(start, start + count):
                          if n in hits:
                              patch_coverable += 1
                              if hits[n] > 0:
                                  patch_covered += 1

          if patch_coverable == 0:
              patch_ok = True
              patch_text = 'Patch coverage: n/a (no executable lines changed)'
              patch_pct = None
          else:
              patch_pct = patch_covered / patch_coverable * 100
              patch_ok = patch_pct >= threshold
              patch_text = f'Patch coverage: {pct(patch_pct)}% ({patch_covered}/{patch_coverable} changed executable lines)'

          baseline_path = workdir / '.github' / 'coverage-baseline.json'
          baseline_text = 'Baseline: none (bootstrap — will be seeded on merge)'
          baseline_ok = True
          baseline_value = None
          baseline_error = None
          if baseline_path.exists():
              try:
                  baseline_value = float(json.loads(baseline_path.read_text(encoding='utf-8')).get('totalLineCoverage'))
                  baseline_text = f'Baseline: {pct(baseline_value)}% line'
                  # Compare at displayed precision (1 decimal) so the gate matches
                  # what reviewers see. Comparing raw floats produced false-negative
                  # failures like `70.864 < 70.9` that displayed identically as
                  # "70.9% < 70.9%" — confusing and not what the ratchet intends.
                  baseline_ok = round(total_rate, 1) >= round(baseline_value, 1)
              except Exception as exc:
                  baseline_error = str(exc)
                  baseline_text = 'Baseline: unreadable/invalid'
                  baseline_ok = False

          floor_ok = round(total_rate, 1) >= round(floor, 1)
          failures = []
          if diff_error is not None:
              failures.append(f'patch diff unavailable (D1): {diff_error}')
          elif not patch_ok:
              failures.append(f'patch {pct(patch_pct)}% < {pct(threshold)}% (D1)')
          if baseline_error is not None:
              failures.append(f'baseline file is invalid (D2): {baseline_error}')
          elif not baseline_ok:
              failures.append(f'total {pct(total_rate)}% < baseline {pct(baseline_value)}% (D2)')
          if not floor_ok:
              failures.append(f'total {pct(total_rate)}% < {pct(floor)}% floor (D3)')

          # Multi-metric display string (line is gated; branch + method are
          # informational so reviewers can see the full picture without leaving
          # the PR). ADR-0011 D2 ratchet uses line coverage only by design.
          total_display = (
              f'{pct(total_rate)}% line'
              + (f' / {pct(branch_rate)}% branch' if branch_total else '')
              + (f' / {pct(method_rate)}% method' if methods_total else '')
          )

          if failures:
              verdict = 'FAILED — ' + '; '.join(failures)
              failed = 'true'
          else:
              baseline_part = f'baseline {pct(baseline_value)}% line' if baseline_value is not None else 'baseline bootstrap'
              patch_part = 'patch n/a' if patch_pct is None else f'patch {pct(patch_pct)}%'
              verdict = f'passed — {patch_part}, total {total_display} ({baseline_part}, floor {pct(floor)}%)'
              failed = 'false'

          detail = f'{patch_text}; Total coverage: {total_display}; {baseline_text}; Floor: {pct(floor)}%'
          emit('verdict', verdict)
          emit('gate_failed', failed)
          emit('summary_line', 'Coverage gate: ' + verdict)
          emit('detail', detail)
          if failed == 'true':
              print('::error::Coverage gate failed: ' + verdict)
              sys.exit(1)
          print('Coverage gate: ' + verdict)
          PY

      - name: Setup .NET SDK for dependency report
        if: ${{ always() }}
        continue-on-error: true
        uses: ./.github/actions-repo/.github/actions/dotnet/setup
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Collect outdated NuGet packages for summary
        id: outdated-report
        continue-on-error: true
        uses: ./.github/actions-repo/.github/actions/deps/report-dotnet
        with:
          working-directory: ${{ inputs.working-directory }}
          project-path: ${{ inputs.project-path }}
          exclude-prerelease: 'true'
          output-directory: ./pr-dependency-report

      - name: Render outdated NuGet summary
        id: outdated-summary
        if: ${{ always() }}
        shell: bash
        env:
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |
          python3 <<'PY'
          import json, os
          from pathlib import Path
          report = Path(os.environ.get('WORKING_DIRECTORY') or '.') / 'pr-dependency-report' / 'dotnet-outdated.json'
          lines = []
          if report.exists():
              try:
                  data = json.loads(report.read_text(encoding='utf-8'))
                  for pkg in sorted(data.get('outdated_packages', []), key=lambda p: p.get('name','').lower()):
                      lines.append(f"- `{pkg.get('name')}`: {pkg.get('current')} → {pkg.get('latest')}")
              except Exception as exc:
                  print(f"::warning::Could not render outdated package summary: {exc}")
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write('markdown<<EOF\n')
              f.write('\n'.join(lines))
              f.write('\nEOF\n')
          PY

      - name: Generate PR summary
        id: gen
        uses: ./.github/actions-repo/.github/actions/pr/generate-summary
        with:
          test-results-directory: TestResults
          build-status: ${{ needs.build-and-test.result == 'success' && 'success' || 'failure' }}
          include-coverage: 'true'
          coverage-gate-verdict: ${{ steps.coverage-gate.outputs.verdict }}
          outdated-packages-markdown: ${{ steps.outdated-summary.outputs.markdown }}
      
      - name: Determine overall status
        id: status
        shell: bash
        run: |
          # Check if any job failed
          BUILD_RESULT="${{ needs.build-and-test.result }}"
          ANALYSIS_RESULT="${{ needs.static-analysis.result }}"
          SECRETS_RESULT="${{ needs.secret-scan.result }}"
          DEPS_RESULT="${{ needs.dependency-scan.result }}"
          CODEQL_RESULT="${{ needs.codeql.result }}"
          NUGET_VERSION_RESULT="${{ needs.nuget-version-consistency-check.result }}"

          # Collect warnings - use empty defaults for skipped jobs
          BUILD_WARNINGS="${{ needs.build-and-test.outputs.has-warnings }}"
          ANALYSIS_WARNINGS="${{ needs.static-analysis.outputs.has-warnings }}"
          SECRETS_WARNINGS="${{ needs.secret-scan.outputs.has-warnings || 'false' }}"
          DEPS_WARNINGS="${{ needs.dependency-scan.outputs.has-warnings || 'false' }}"
          CODEQL_WARNINGS="${{ needs.codeql.outputs.has-warnings || 'false' }}"

          BUILD_WARNING_MSG="${{ needs.build-and-test.outputs.warning-messages }}"
          ANALYSIS_WARNING_MSG="${{ needs.static-analysis.outputs.warning-messages }}"
          SECRETS_WARNING_MSG="${{ needs.secret-scan.outputs.warning-messages }}"
          DEPS_WARNING_MSG="${{ needs.dependency-scan.outputs.warning-messages }}"
          CODEQL_WARNING_MSG="${{ needs.codeql.outputs.warning-messages }}"

          COVERAGE_GATE_FAILED="${{ steps.coverage-gate.outputs.gate_failed || 'false' }}"

          # Determine status - don't fail on skipped jobs
          if [[ "$BUILD_RESULT" == "failure" || "$ANALYSIS_RESULT" == "failure" || "$SECRETS_RESULT" == "failure" || "$DEPS_RESULT" == "failure" || "$CODEQL_RESULT" == "failure" || "$NUGET_VERSION_RESULT" == "failure" || "$COVERAGE_GATE_FAILED" == "true" ]]; then
            echo "icon=:x:" >> $GITHUB_OUTPUT
            echo "status=Failed" >> $GITHUB_OUTPUT
          elif [[ "$BUILD_WARNINGS" == "true" || "$ANALYSIS_WARNINGS" == "true" || "$SECRETS_WARNINGS" == "true" || "$DEPS_WARNINGS" == "true" || "$CODEQL_WARNINGS" == "true" ]]; then
            echo "icon=:warning:" >> $GITHUB_OUTPUT
            echo "status=Passed with Warnings" >> $GITHUB_OUTPUT
          else
            echo "icon=:white_check_mark:" >> $GITHUB_OUTPUT
            echo "status=Success" >> $GITHUB_OUTPUT
          fi

          # Build warnings section
          WARNINGS_SECTION=""
          if [[ "$BUILD_WARNINGS" == "true" && -n "$BUILD_WARNING_MSG" ]]; then
            WARNINGS_SECTION="${WARNINGS_SECTION}
          - :warning: **Build & Test:** $BUILD_WARNING_MSG"
          fi
          if [[ "$ANALYSIS_WARNINGS" == "true" && -n "$ANALYSIS_WARNING_MSG" ]]; then
            WARNINGS_SECTION="${WARNINGS_SECTION}
          - :warning: **Static Analysis:** $ANALYSIS_WARNING_MSG"
          fi
          if [[ "$SECRETS_WARNINGS" == "true" && -n "$SECRETS_WARNING_MSG" ]]; then
            WARNINGS_SECTION="${WARNINGS_SECTION}
          - :warning: **Secret Scan:** $SECRETS_WARNING_MSG"
          fi
          if [[ "$DEPS_WARNINGS" == "true" && -n "$DEPS_WARNING_MSG" ]]; then
            WARNINGS_SECTION="${WARNINGS_SECTION}
          - :warning: **Dependency Scan:** $DEPS_WARNING_MSG"
          fi
          if [[ "$CODEQL_WARNINGS" == "true" && -n "$CODEQL_WARNING_MSG" ]]; then
            WARNINGS_SECTION="${WARNINGS_SECTION}
          - :warning: **CodeQL:** $CODEQL_WARNING_MSG"
          fi

          # Save to output
          {
            echo "warnings<<EOF"
            echo "$WARNINGS_SECTION"
            echo "EOF"
          } >> $GITHUB_OUTPUT
      
      - name: Build summary message
        id: message
        env:
          BASE_MARKDOWN: ${{ steps.gen.outputs.markdown }}
          JOB_BUILD_RESULT: ${{ needs.build-and-test.result }}
          JOB_STATIC_RESULT: ${{ needs.static-analysis.result }}
          JOB_SECRET_RESULT: ${{ needs.secret-scan.result }}
          JOB_DEPS_RESULT: ${{ needs.dependency-scan.result }}
          DEPS_FINDINGS: ${{ needs.dependency-scan.outputs.findings-count }}
          DEPS_CRITICAL: ${{ needs.dependency-scan.outputs.critical-count }}
          DEPS_HIGH: ${{ needs.dependency-scan.outputs.high-count }}
          DEPS_MODERATE: ${{ needs.dependency-scan.outputs.moderate-count }}
          DEPS_LOW: ${{ needs.dependency-scan.outputs.low-count }}
          JOB_CODEQL_RESULT: ${{ needs.codeql.result }}
          CODEQL_FINDINGS: ${{ needs.codeql.outputs.findings-count }}
          CODEQL_ERROR: ${{ needs.codeql.outputs.error-count }}
          CODEQL_WARNING: ${{ needs.codeql.outputs.warning-count }}
          CODEQL_NOTE: ${{ needs.codeql.outputs.note-count }}
          JOB_AUTHORSHIP_RESULT: ${{ needs.authorship-check.result }}
          AUTHORSHIP_CLASS: ${{ needs.authorship-check.outputs.authorship }}
          JOB_PR_METADATA_RESULT: ${{ needs.pr-metadata-check.result }}
          JOB_NUGET_VERSION_RESULT: ${{ needs.nuget-version-consistency-check.result }}
          JOB_PR_SIZE_RESULT: ${{ needs.pr-size-check.result }}
          WARNINGS_BLOCK: ${{ steps.status.outputs.warnings }}
          COVERAGE_GATE_DETAIL: ${{ steps.coverage-gate.outputs.detail }}
          BUILD_CONFIGURATION: ${{ inputs.configuration }}
          RUNS_ON: ${{ inputs.runs-on }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          # Persist base markdown from env var safely
          printf "%s" "$BASE_MARKDOWN" > message.md

          {
            echo ""
            echo "### Job Results"
            echo "- **Build and Test:** $JOB_BUILD_RESULT"
            echo "- **Static Analysis:** $JOB_STATIC_RESULT"
          } >> message.md

          if [ "$JOB_SECRET_RESULT" != "skipped" ]; then
            echo "- **Secret Scan:** $JOB_SECRET_RESULT" >> message.md
          fi

          if [ "$JOB_DEPS_RESULT" != "skipped" ]; then
            FINDINGS="${DEPS_FINDINGS:-0}"
            if [ "$FINDINGS" -gt 0 ]; then
              BREAKDOWN_PARTS=()
              [ "${DEPS_CRITICAL:-0}" -gt 0 ] && BREAKDOWN_PARTS+=("${DEPS_CRITICAL} critical")
              [ "${DEPS_HIGH:-0}"     -gt 0 ] && BREAKDOWN_PARTS+=("${DEPS_HIGH} high")
              [ "${DEPS_MODERATE:-0}" -gt 0 ] && BREAKDOWN_PARTS+=("${DEPS_MODERATE} moderate")
              [ "${DEPS_LOW:-0}"      -gt 0 ] && BREAKDOWN_PARTS+=("${DEPS_LOW} low")
              BREAKDOWN=$(IFS=', '; echo "${BREAKDOWN_PARTS[*]}")
              echo "- **Dependency Scan:** $JOB_DEPS_RESULT — ${FINDINGS} vulnerabilities (${BREAKDOWN})" >> message.md
            else
              echo "- **Dependency Scan:** $JOB_DEPS_RESULT — no vulnerabilities" >> message.md
            fi
          fi

          if [ "$JOB_CODEQL_RESULT" != "skipped" ]; then
            CQ_FINDINGS="${CODEQL_FINDINGS:-0}"
            if [ "$CQ_FINDINGS" -gt 0 ]; then
              CQ_PARTS=()
              [ "${CODEQL_ERROR:-0}"   -gt 0 ] && CQ_PARTS+=("${CODEQL_ERROR} error")
              [ "${CODEQL_WARNING:-0}" -gt 0 ] && CQ_PARTS+=("${CODEQL_WARNING} warning")
              [ "${CODEQL_NOTE:-0}"    -gt 0 ] && CQ_PARTS+=("${CODEQL_NOTE} note")
              CQ_BREAKDOWN=$(IFS=', '; echo "${CQ_PARTS[*]}")
              echo "- **CodeQL:** $JOB_CODEQL_RESULT — ${CQ_FINDINGS} finding(s) (${CQ_BREAKDOWN})" >> message.md
            else
              echo "- **CodeQL:** $JOB_CODEQL_RESULT — no findings" >> message.md
            fi
          fi

          {
            echo "- **Authorship Check:** $JOB_AUTHORSHIP_RESULT${AUTHORSHIP_CLASS:+ - $AUTHORSHIP_CLASS}"
            echo "- **PR Metadata Check:** $JOB_PR_METADATA_RESULT"
            echo "- **NuGet Version Consistency:** $JOB_NUGET_VERSION_RESULT"
            echo "- **PR Size Check:** $JOB_PR_SIZE_RESULT"
          } >> message.md

          if [ -n "$COVERAGE_GATE_DETAIL" ]; then
            {
              echo ""
              echo "### Coverage Gate Details"
              echo "$COVERAGE_GATE_DETAIL"
            } >> message.md
          fi

          if [ -n "$WARNINGS_BLOCK" ]; then
            {
              echo ""
              echo "### Warnings"
              echo "$WARNINGS_BLOCK"
            } >> message.md
          fi

          {
            echo ""
            echo "### Configuration"
            echo "- **Build Configuration:** $BUILD_CONFIGURATION"
            echo "- **Runner:** $RUNS_ON"
            echo "- **Commit:** \`$COMMIT_SHA\`"
            echo ""
            echo "---"
            echo "_View detailed logs in the [workflow run]($RUN_URL)_"
          } >> message.md

          {
            echo "text<<EOF"
            cat message.md
            echo "EOF"
          } >> $GITHUB_OUTPUT
      
      - name: Write summary to GitHub
        shell: bash
        env:
          SUMMARY_TEXT: ${{ steps.message.outputs.text }}
        run: |
          printf "%s\n" "$SUMMARY_TEXT" >> "$GITHUB_STEP_SUMMARY"
      
      - name: Post PR comment
        if: ${{ inputs.post-pr-summary }}
        continue-on-error: true
        uses: ./.github/actions-repo/.github/actions/pr/post-comment
        with:
          github-token: ${{ secrets.github-token || github.token }}
          message: ${{ steps.message.outputs.text }}

      - name: Fail when coverage gate fails
        if: ${{ steps.coverage-gate.outputs.gate_failed == 'true' || steps.coverage-gate.outcome == 'failure' }}
        shell: bash
        run: |
          echo "::error::Coverage gate failed: ${{ steps.coverage-gate.outputs.verdict || 'gate step failed before producing a verdict' }}"
          exit 1

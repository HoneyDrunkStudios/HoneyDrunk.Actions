# ==============================================================================
# Grid Review Request Workflow
# ==============================================================================
# Purpose:
#   Advisory trigger rail for ADR-0086 pull-based local-worker PR review.
#
# Responsibilities:
#   - Decide whether a pull request should request Grid review
#   - Build the versioned review-request payload
#   - Apply high-confidence PR classification labels that already exist
#   - Normalize worker-state labels for the PR/head SHA
#   - Upsert the structured queue comment consumed by the local worker
#
# Non-goals:
#   - Running Codex, Claude, Anthropic, OpenAI, or any model API in GitHub Actions
#   - Blocking branch protection while the local worker is unavailable
# ==============================================================================

name: Grid Review Request

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'GitHub runner to use'
        required: false
        type: string
        default: 'ubuntu-latest'
      review-config-path:
        description: 'Path to the repo review config file'
        required: false
        type: string
        default: '.honeydrunk-review.yaml'
      openclaw-webhook-url:
        description: 'Deprecated ADR-0044 input retained for compatibility; local-worker queueing ignores it'
        required: false
        type: string
        default: ''
      upload-fallback-artifact:
        description: 'Deprecated ADR-0044 input retained for compatibility; local-worker queueing ignores it'
        required: false
        type: boolean
        default: false
      post-fallback-comment:
        description: 'Deprecated ADR-0044 input retained for compatibility; local-worker queueing ignores it'
        required: false
        type: boolean
        default: false
      artifact-name:
        description: 'Deprecated ADR-0044 input retained for compatibility; local-worker queueing ignores it'
        required: false
        type: string
        default: 'grid-review-request'
      queue-label:
        description: 'Label that marks a PR as queued for local-worker review'
        required: false
        type: string
        default: 'needs-agent-review'
      in-progress-label:
        description: 'Label used by the local worker while it owns the PR claim'
        required: false
        type: string
        default: 'agent-review-in-progress'
      reviewed-label:
        description: 'Completion label used after a clean worker verdict'
        required: false
        type: string
        default: 'agent-reviewed'
      changes-requested-label:
        description: 'Completion label used after a blocking/request-changes worker verdict'
        required: false
        type: string
        default: 'changes-requested-by-agent'
      queue-comment-marker:
        description: 'Machine-readable marker used by the local worker to find the queue comment'
        required: false
        type: string
        default: 'honeydrunk-grid-review-queue:v1'
      apply-classification-labels:
        description: 'Apply inferred non-worker PR labels when those labels already exist on the target repository'
        required: false
        type: boolean
        default: true
    secrets:
      openclaw-webhook-secret:
        description: 'Deprecated ADR-0044 secret retained for compatibility; local-worker queueing ignores it'
        required: false
      github-token:
        description: 'GitHub token for PR metadata, labels, and queue comments'
        required: true

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  request-grid-review:
    name: Request Grid Review
    runs-on: ${{ inputs.runs-on }}

    steps:
      - name: Validate pull request context
        id: event
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          if [ -z "$PR_NUMBER" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=missing-pull-request-context" >> "$GITHUB_OUTPUT"
            echo "::notice::Grid review request skipped: the caller event did not include pull_request context."
            exit 0
          fi

          if [ "$PR_DRAFT" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=draft-pr" >> "$GITHUB_OUTPUT"
            echo "::notice::Grid review request skipped: draft PR."
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: ${{ steps.event.outputs.skip != 'true' }}
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1

      - name: Evaluate skip rules and config
        if: ${{ steps.event.outputs.skip != 'true' }}
        id: gate
        shell: bash
        env:
          EVENT_PATH: ${{ github.event_path }}
          REVIEW_CONFIG_PATH: ${{ inputs.review-config-path }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          event = json.loads(Path(os.environ['EVENT_PATH']).read_text(encoding='utf-8'))
          labels = {label.get('name', '').lower() for label in event['pull_request'].get('labels', [])}
          config_path = Path(os.environ['REVIEW_CONFIG_PATH'])

          skip = False
          reason = ''
          runner = 'local-worker'
          risk_class = 'normal'

          if 'skip-review' in labels:
              skip = True
              reason = 'skip-review-label'
          elif not config_path.exists():
              skip = True
              reason = 'missing-review-config'
          else:
              config = config_path.read_text(encoding='utf-8')
              runner_match = re.search(r'(?im)^\s*runner\s*:\s*([^\r\n#]+)', config)
              risk_match = re.search(r'(?im)^\s*review_risk_class\s*:\s*([^\r\n#]+)', config)
              runner = runner_match.group(1).strip() if runner_match else 'local-worker'
              risk_class = risk_match.group(1).strip() if risk_match else 'normal'

              if not re.search(r'(?im)^\s*enabled\s*:\s*true\s*(?:#.*)?$', config):
                  skip = True
                  reason = 'review-config-disabled'
              elif runner == 'api-ci':
                  skip = True
                  reason = 'api-ci-runner-not-implemented'
              elif runner != 'local-worker':
                  skip = True
                  reason = f'unsupported-runner-{runner}'
              else:
                  reason = 'enabled'

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f"skip={str(skip).lower()}\n")
              output.write(f"reason={reason}\n")
              output.write(f"runner={runner}\n")
              output.write(f"risk-class={risk_class}\n")

          if skip:
              print(f"::notice::Grid review request skipped: {reason}.")
          else:
              print("::notice::Grid review request enabled for local-worker queue.")
          PY

      - name: Build review request payload
        if: ${{ steps.event.outputs.skip != 'true' && steps.gate.outputs.skip != 'true' }}
        id: payload
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github-token }}
          EVENT_PATH: ${{ github.event_path }}
          REVIEW_CONFIG_PATH: ${{ inputs.review-config-path }}
          RUNNER_NAME: ${{ steps.gate.outputs.runner }}
          RISK_CLASS: ${{ steps.gate.outputs.risk-class }}
        run: |
          set -euo pipefail

          pr_number='${{ github.event.pull_request.number }}'
          repo='${{ github.repository }}'

          gh api "repos/${repo}/pulls/${pr_number}/files?per_page=100" --paginate --slurp > changed-files.json

          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          event = json.loads(Path(os.environ['EVENT_PATH']).read_text(encoding='utf-8'))
          pages = json.loads(Path('changed-files.json').read_text(encoding='utf-8'))
          files = [item for page in pages for item in page]
          pr = event['pull_request']
          repo = event['repository']
          body = pr.get('body') or ''
          config_path = Path(os.environ['REVIEW_CONFIG_PATH'])
          config_text = config_path.read_text(encoding='utf-8') if config_path.exists() else ''

          allowed_authorship = {'human', 'agent-codex', 'agent-copilot', 'agent-claude-code', 'mixed'}
          authorship_match = re.search(r'(?im)^\s*Authorship\s*:\s*([^\r\n]+)', body)
          raw_authorship = authorship_match.group(1).strip().lower() if authorship_match else ''
          if raw_authorship in allowed_authorship:
              authorship_class = raw_authorship
              authorship_source = 'pr-body'
          elif authorship_match:
              authorship_class = 'unknown'
              authorship_source = 'invalid'
              print('::warning::Invalid Authorship value; queue metadata will use unknown.')
          else:
              authorship_class = 'unknown'
              authorship_source = 'missing'

          packet_url_match = re.search(r'https://github\.com/HoneyDrunkStudios/[^\s)]+/issues/\d+', body)
          packet_path_match = re.search(r'generated/issue-packets/[^\s)`]+\.md', body)
          adr_matches = sorted(set(re.findall(r'ADR-\d{4}', body + '\n' + config_text)))

          owner, name = repo['full_name'].split('/', 1)
          head_sha = pr['head']['sha']
          idempotency_key = f"{repo['full_name']}#{pr['number']}@{head_sha}"

          file_names = [item['filename'] for item in files]
          additions = sum(int(item.get('additions') or 0) for item in files)
          deletions = sum(int(item.get('deletions') or 0) for item in files)

          payload = {
              'schemaVersion': 2,
              'event': 'grid-review-request',
              'idempotencyKey': idempotency_key,
              'repo': {
                  'owner': owner,
                  'name': name,
                  'fullName': repo['full_name'],
                  'cloneUrl': repo['clone_url'],
              },
              'pullRequest': {
                  'number': pr['number'],
                  'headSha': head_sha,
                  'baseRef': pr['base']['ref'],
                  'headRef': pr['head']['ref'],
                  'isDraft': bool(pr.get('draft')),
                  'author': pr['user']['login'],
                  'url': pr['html_url'],
              },
              'authorship': {
                  'class': authorship_class,
                  'source': authorship_source,
              },
              'changeSummary': {
                  'changedFiles': len(files),
                  'additions': additions,
                  'deletions': deletions,
                  'files': file_names,
              },
              'context': {
                  'packetUrl': packet_url_match.group(0) if packet_url_match else None,
                  'packetPath': packet_path_match.group(0) if packet_path_match else None,
                  'adrs': adr_matches,
                  'node': None,
              },
              'config': {
                  'enabled': True,
                  'runner': os.environ['RUNNER_NAME'],
                  'riskClass': os.environ['RISK_CLASS'],
              },
              'callback': {
                  'mode': 'github-pr-comment',
                  'prCommentsUrl': pr['comments_url'],
                  'checksUrl': f"{repo['url']}/check-runs",
              },
          }

          Path('review-request.json').write_text(json.dumps(payload, indent=2) + '\n', encoding='utf-8')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f"idempotency-key={idempotency_key}\n")
              output.write(f"head-sha={head_sha}\n")
              output.write(f"authorship-class={authorship_class}\n")
              output.write(f"changed-files={len(files)}\n")
              output.write(f"additions={additions}\n")
              output.write(f"deletions={deletions}\n")
          PY

      - name: Apply PR classification labels
        if: ${{ inputs.apply-classification-labels && steps.event.outputs.skip != 'true' && steps.gate.outputs.skip != 'true' }}
        id: classification
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github-token }}
          EVENT_PATH: ${{ github.event_path }}
          QUEUE_LABEL: ${{ inputs.queue-label }}
          IN_PROGRESS_LABEL: ${{ inputs.in-progress-label }}
          REVIEWED_LABEL: ${{ inputs.reviewed-label }}
          CHANGES_REQUESTED_LABEL: ${{ inputs.changes-requested-label }}
        run: |
          set -euo pipefail

          repo='${{ github.repository }}'
          pr_number='${{ github.event.pull_request.number }}'

          gh api "repos/${repo}/labels?per_page=100" --paginate --slurp > repo-labels.json

          python3 - <<'PY' > inferred-labels.txt
          import json
          import os
          import re
          from pathlib import Path

          event = json.loads(Path(os.environ['EVENT_PATH']).read_text(encoding='utf-8'))
          pages = json.loads(Path('changed-files.json').read_text(encoding='utf-8'))
          files = [item for page in pages for item in page]
          label_pages = json.loads(Path('repo-labels.json').read_text(encoding='utf-8'))
          existing = {item['name'].lower(): item['name'] for page in label_pages for item in page}

          worker_labels = {
              os.environ['QUEUE_LABEL'].lower(),
              os.environ['IN_PROGRESS_LABEL'].lower(),
              os.environ['REVIEWED_LABEL'].lower(),
              os.environ['CHANGES_REQUESTED_LABEL'].lower(),
          }

          pr = event['pull_request']
          title = pr.get('title') or ''
          body = pr.get('body') or ''
          paths = [item['filename'] for item in files]
          text = '\n'.join([title, body, *paths]).lower()
          candidates = []

          def add(label):
              key = label.lower()
              if key in worker_labels:
                  return
              if key in existing and existing[key] not in candidates:
                  candidates.append(existing[key])

          adr_numbers = sorted(set(re.findall(r'adr[-_/ ]?0*(\d{1,4})', text)))
          for number in adr_numbers:
              add(f"adr-{int(number):04d}")

          markdown_paths = [path for path in paths if path.lower().endswith('.md')]
          if markdown_paths and len(markdown_paths) == len(paths):
              add('docs')
          if any(path.startswith(('adrs/', 'constitution/', 'catalogs/', 'initiatives/', 'repos/')) for path in paths):
              add('meta')
              add('architecture')
              add('governance')
          if any(path.startswith('constitution/') for path in paths):
              add('constitution')
          if any(path.startswith('catalogs/') for path in paths):
              add('catalog')
          if any(path.startswith('infrastructure/') for path in paths) or ' infrastructure' in f' {text}':
              add('infra')
          if any(path.startswith('.github/workflows/') or path.endswith(('.yml', '.yaml')) for path in paths):
              add('ci')

          security_terms = ('secret', 'credential', 'token', 'key vault', 'pat', 'api key', 'rotation', 'sensitive')
          if any(term in text for term in security_terms):
              add('security')
              add('secrets')

          if re.search(r'\bbugs?\b', text) or re.search(r'\bfix(?:e[sd])?\b', title.lower()):
              add('bug')
          elif any(word in text for word in ('add ', 'create ', 'introduce ', 'standup', 'stand up', 'enable ', 'accept adr')):
              add('enhancement')

          node_terms = {
              'actions': ('honeydrunk.actions', '/actions', 'actions/'),
              'agents': ('honeydrunk.agents',),
              'ai': ('honeydrunk.ai',),
              'audit': ('honeydrunk.audit',),
              'cache': ('honeydrunk.cache', 'redis'),
              'core': ('honeydrunk.core',),
              'files': ('honeydrunk.files',),
              'identity': ('honeydrunk.identity', 'entra'),
              'web-ui': ('honeydrunk.web.ui', 'web.ui'),
          }
          for label, needles in node_terms.items():
              if any(needle in text for needle in needles):
                  add(label)

          for label in candidates:
              print(label)
          PY

          if [ -s inferred-labels.txt ]; then
            while IFS= read -r label; do
              if ! gh issue edit "$pr_number" --repo "$repo" --add-label "$label"; then
                echo "::warning::Could not apply optional classification label '${label}'. Continuing with Grid review queueing."
              fi
            done < inferred-labels.txt
            labels="$(paste -sd ',' inferred-labels.txt)"
            echo "labels=${labels}" >> "$GITHUB_OUTPUT"
            echo "::notice::Applied PR classification labels: ${labels}"
          else
            echo "labels=" >> "$GITHUB_OUTPUT"
            echo "::notice::No existing high-confidence PR classification labels matched."
          fi

      - name: Normalize local-worker queue labels
        if: ${{ steps.event.outputs.skip != 'true' && steps.gate.outputs.skip != 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github-token }}
          QUEUE_LABEL: ${{ inputs.queue-label }}
          IN_PROGRESS_LABEL: ${{ inputs.in-progress-label }}
          REVIEWED_LABEL: ${{ inputs.reviewed-label }}
          CHANGES_REQUESTED_LABEL: ${{ inputs.changes-requested-label }}
        run: |
          set -euo pipefail

          repo='${{ github.repository }}'
          pr_number='${{ github.event.pull_request.number }}'

          encode_label() {
            python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$1"
          }

          remove_label() {
            local label="$1"
            local encoded
            encoded="$(encode_label "$label")"
            gh api --method DELETE "repos/${repo}/issues/${pr_number}/labels/${encoded}" >/dev/null 2>&1 || true
          }

          remove_label "$IN_PROGRESS_LABEL"
          remove_label "$REVIEWED_LABEL"
          remove_label "$CHANGES_REQUESTED_LABEL"

          gh api --method POST "repos/${repo}/issues/${pr_number}/labels" \
            -f "labels[]=${QUEUE_LABEL}" >/dev/null

      - name: Upsert local-worker queue comment
        if: ${{ steps.event.outputs.skip != 'true' && steps.gate.outputs.skip != 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github-token }}
          QUEUE_COMMENT_MARKER: ${{ inputs.queue-comment-marker }}
          AUTHORSHIP_CLASS: ${{ steps.payload.outputs.authorship-class }}
        run: |
          set -euo pipefail

          repo='${{ github.repository }}'
          pr_number='${{ github.event.pull_request.number }}'
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          queued_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          cat > grid-review-queue-comment.md <<EOF
          <!-- ${QUEUE_COMMENT_MARKER} -->
          status: queued
          idempotency_key: ${{ steps.payload.outputs.idempotency-key }}
          head_sha: ${{ steps.payload.outputs.head-sha }}
          authorship_class: ${AUTHORSHIP_CLASS}
          queued_at: ${queued_at}
          runner: ${{ steps.gate.outputs.runner }}
          risk_class: ${{ steps.gate.outputs.risk-class }}
          run_id: ${{ github.run_id }}
          run_attempt: ${{ github.run_attempt }}

          Grid review queued for the ADR-0086 local worker.

          The worker will claim this PR by replacing \`${{ inputs.queue-label }}\` with \`${{ inputs.in-progress-label }}\`, run the subscribed local CLI review, and post one advisory verdict for head SHA \`${{ steps.payload.outputs.head-sha }}\`.

          Queue source: ${run_url}
          EOF

          gh api "repos/${repo}/issues/${pr_number}/comments?per_page=100" --paginate --slurp > comments.json
          comment_id="$(python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          marker = os.environ['QUEUE_COMMENT_MARKER']
          pages = json.loads(Path('comments.json').read_text(encoding='utf-8'))
          comments = [comment for page in pages for comment in page]
          matches = [comment for comment in comments if marker in (comment.get('body') or '')]
          print(matches[-1]['id'] if matches else '')
          PY
          )"

          if [ -n "$comment_id" ]; then
            comment_body="$(cat grid-review-queue-comment.md)"
            gh api --method PATCH "repos/${repo}/issues/comments/${comment_id}" \
              -f "body=${comment_body}" >/dev/null
            echo "::notice::Updated existing Grid review queue comment."
          else
            gh issue comment "$pr_number" --repo "$repo" --body-file grid-review-queue-comment.md >/dev/null
            echo "::notice::Created Grid review queue comment."
          fi

      - name: Summarize skipped request
        if: ${{ steps.event.outputs.skip == 'true' || steps.gate.outputs.skip == 'true' }}
        shell: bash
        run: |
          reason="${{ steps.event.outputs.reason }}"
          if [ -z "$reason" ]; then
            reason="${{ steps.gate.outputs.reason }}"
          fi

          {
            echo "## Grid Review Request"
            echo
            echo "- Status: skipped"
            echo "- Reason: ${reason}"
            echo "- Advisory only: true"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize queued request
        if: ${{ steps.event.outputs.skip != 'true' && steps.gate.outputs.skip != 'true' }}
        shell: bash
        run: |
          {
            echo "## Grid Review Request"
            echo
            echo "- Status: queued for local worker"
            echo "- Gate result: ${{ steps.gate.outputs.reason }}"
            echo "- Idempotency key: ${{ steps.payload.outputs.idempotency-key }}"
            echo "- Head SHA: ${{ steps.payload.outputs.head-sha }}"
            echo "- Changed files: ${{ steps.payload.outputs.changed-files }}"
            echo "- Additions/deletions: +${{ steps.payload.outputs.additions }} / -${{ steps.payload.outputs.deletions }}"
            echo "- Queue label: ${{ inputs.queue-label }}"
            echo "- Queue marker: ${{ inputs.queue-comment-marker }}"
            echo "- Classification labels: ${{ steps.classification.outputs.labels }}"
            echo "- Advisory only: true"
          } >> "$GITHUB_STEP_SUMMARY"

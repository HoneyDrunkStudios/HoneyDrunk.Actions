# ==============================================================================
# Nightly Security Workflow
# ==============================================================================
# Purpose:
#   Deep, comprehensive security scanning run on a schedule.
#   Performs thorough analysis that is too expensive for PR workflows.
#
# Responsibilities:
#   - Run deep SAST (Static Application Security Testing)
#   - Run full dependency vulnerability scan (including transitive deps)
#   - Run infrastructure as code (IaC) security checks
#   - Detect secrets and credentials in entire codebase
#   - Generate security report artifacts
#   - Optionally create/update security issues
#
# Target:
#   All repos in the HoneyDrunk Grid
#
# Triggers:
#   - This workflow is reusable via workflow_call
#   - Consuming repos should trigger on schedule (e.g., cron: '0 2 * * *')
#   - Can also be triggered manually via workflow_dispatch
#
# Usage Example:
#   See docs/consumer-usage.md for sample consumer workflows
# ==============================================================================

name: Nightly Security

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: 'The .NET SDK version to use'
        required: false
        type: string
        default: '10.0.x'
      
      runs-on:
        description: 'GitHub runner to use'
        required: false
        type: string
        default: 'ubuntu-latest'
      
      working-directory:
        description: 'Working directory for all operations'
        required: false
        type: string
        default: '.'
      
      project-path:
        description: 'Path to solution or project file (auto-detected if not specified)'
        required: false
        type: string
        default: ''
      
      enable-sast:
        description: 'Run deep SAST analysis'
        required: false
        type: boolean
        default: true
      
      enable-iac-scan:
        description: 'Scan infrastructure as code files (Terraform, ARM, etc.)'
        required: false
        type: boolean
        default: true
      
      enable-secret-scan:
        description: 'Scan entire codebase for secrets'
        required: false
        type: boolean
        default: true
      
      fail-on-high-severity:
        description: 'Fail the workflow if high or critical issues found'
        required: false
        type: boolean
        default: false
      
      create-issues:
        description: 'Create GitHub issues for security findings'
        required: false
        type: boolean
        default: false
      
      actions-ref:
        description: 'Git ref of HoneyDrunk.Actions to use'
        required: false
        type: string
        default: 'main'
    
    secrets:
      github-token:
        description: 'GitHub token for creating issues'
        required: false

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  dependency-scan:
    name: Deep Dependency Vulnerability Scan
    runs-on: ${{ inputs.runs-on }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Checkout HoneyDrunk.Actions
        uses: actions/checkout@v4
        with:
          repository: HoneyDrunkStudios/HoneyDrunk.Actions
          path: .github/actions-repo
          ref: ${{ inputs.actions-ref }}
      
      - name: Setup .NET SDK
        uses: ./.github/actions-repo/.github/actions/dotnet/setup
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      
      - name: Restore dependencies
        uses: ./.github/actions-repo/.github/actions/dotnet/restore
        with:
          working-directory: ${{ inputs.working-directory }}
          project-path: ${{ inputs.project-path }}
      
      - name: Run comprehensive vulnerability scan
        uses: ./.github/actions-repo/.github/actions/security/vulnerability-scan
        with:
          working-directory: ${{ inputs.working-directory }}
          project-path: ${{ inputs.project-path }}
          fail-on-severity: ${{ inputs.fail-on-high-severity && 'high' || 'critical' }}
      
      - name: Generate detailed vulnerability report
        id: vuln-report
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          mkdir -p ./security-reports
          SCAN_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          PROJECT="${{ inputs.project-path }}"
          if [ -z "$PROJECT" ]; then
            PROJECT=$(find . -maxdepth 2 \( -name '*.slnx' -o -name '*.sln' \) | head -1)
          fi

          echo "Scanning $PROJECT for vulnerable packages (including transitive)..."

          # Capture both vulnerable and deprecated packages
          VULN_OUTPUT=$(dotnet list "$PROJECT" package --vulnerable --include-transitive --format json 2>/dev/null || echo '{}')
          DEPRECATED_OUTPUT=$(dotnet list "$PROJECT" package --deprecated --include-transitive --format json 2>/dev/null || echo '{}')

          # Write raw outputs
          echo "$VULN_OUTPUT" > ./security-reports/vulnerable-packages.json
          echo "$DEPRECATED_OUTPUT" > ./security-reports/deprecated-packages.json

          # Count findings
          VULN_COUNT=$(echo "$VULN_OUTPUT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          total = 0
          for project in data.get('projects', []):
              for framework in project.get('frameworks', []):
                  total += len(framework.get('topLevelPackages', []))
                  total += len(framework.get('transitivePackages', []))
          print(total)
          " 2>/dev/null || echo "0")

          echo "vuln_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          echo "Found $VULN_COUNT vulnerable packages"

          # Build consolidated report
          cat > ./security-reports/vulnerabilities.json <<EOF
          {
            "scan_date": "$SCAN_DATE",
            "repository": "${{ github.repository }}",
            "vulnerability_count": $VULN_COUNT,
            "vulnerable_packages": $VULN_OUTPUT,
            "deprecated_packages": $DEPRECATED_OUTPUT
          }
          EOF
      
      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report
          path: ${{ inputs.working-directory }}/security-reports/**/*
          retention-days: 90
  
  sast-analysis:
    name: Deep SAST Analysis
    if: ${{ inputs.enable-sast }}
    runs-on: ${{ inputs.runs-on }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-and-quality

      - name: Checkout HoneyDrunk.Actions
        uses: actions/checkout@v4
        with:
          repository: HoneyDrunkStudios/HoneyDrunk.Actions
          path: .github/actions-repo
          ref: ${{ inputs.actions-ref }}

      - name: Setup .NET SDK
        uses: ./.github/actions-repo/.github/actions/dotnet/setup
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Build for CodeQL analysis
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          PROJECT="${{ inputs.project-path }}"
          if [ -z "$PROJECT" ]; then
            PROJECT=$(find . -maxdepth 2 \( -name '*.slnx' -o -name '*.sln' \) | head -1)
          fi
          dotnet build "$PROJECT" --no-incremental

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: nightly-sast
          output: ${{ inputs.working-directory }}/security-reports
          upload: true

      - name: Upload SAST report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: ${{ inputs.working-directory }}/security-reports/**/*.sarif
          retention-days: 90
  
  secret-scan:
    name: Full Codebase Secret Scan
    if: ${{ inputs.enable-secret-scan }}
    runs-on: ${{ inputs.runs-on }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout HoneyDrunk.Actions (shared gitleaks config)
        uses: actions/checkout@v4
        with:
          repository: HoneyDrunkStudios/HoneyDrunk.Actions
          path: .github/actions-repo
          ref: ${{ inputs.actions-ref }}

      - name: Create reports directory
        shell: bash
        run: mkdir -p ./security-reports

      - name: Resolve gitleaks config
        id: gitleaks-config
        shell: bash
        run: |
          if [ -f ".gitleaks.toml" ]; then
            echo "Using repo-local .gitleaks.toml"
            echo "path=.gitleaks.toml" >> $GITHUB_OUTPUT
          else
            echo "Using shared HoneyDrunk.Actions gitleaks config"
            echo "path=.github/actions-repo/.github/config/gitleaks.toml" >> $GITHUB_OUTPUT
          fi

      - name: Install gitleaks
        shell: bash
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks full-history scan
        id: gitleaks
        shell: bash
        run: |
          set +e
          gitleaks detect \
            --source . \
            --config "${{ steps.gitleaks-config.outputs.path }}" \
            --report-format sarif \
            --report-path ./security-reports/secrets-scan.sarif \
            --redact \
            --exit-code 0 \
            --log-level info
          echo "gitleaks_exit=$?" >> $GITHUB_OUTPUT

      - name: Upload secrets SARIF to GitHub Security
        if: always() && hashFiles('./security-reports/secrets-scan.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./security-reports/secrets-scan.sarif
          category: nightly-secrets

      - name: Evaluate findings
        if: always()
        id: findings
        shell: bash
        run: |
          if [ -f "./security-reports/secrets-scan.sarif" ]; then
            FINDING_COUNT=$(python3 -c "
          import json
          with open('./security-reports/secrets-scan.sarif') as f:
              sarif = json.load(f)
          total = sum(len(r.get('results', [])) for r in sarif.get('runs', []))
          print(total)
          " 2>/dev/null || echo "0")
          else
            FINDING_COUNT=0
          fi
          echo "secret_count=$FINDING_COUNT" >> $GITHUB_OUTPUT
          echo "Found $FINDING_COUNT secrets in full history scan"
          if [ "$FINDING_COUNT" -gt 0 ]; then
            echo "::warning::Found $FINDING_COUNT potential secrets in repository history"
          fi

      - name: Upload secret scan report
        if: always() && hashFiles('./security-reports/secrets-scan.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-report
          path: ./security-reports/secrets-scan.sarif
          retention-days: 90
  
  iac-security-scan:
    name: Infrastructure as Code Security Scan
    if: ${{ inputs.enable-iac-scan }}
    runs-on: ${{ inputs.runs-on }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Detect IaC files
        id: detect
        shell: bash
        run: |
          echo "Detecting Infrastructure as Code files..."
          
          # Look for common IaC patterns
          IAC_COUNT=0
          if find . \( -name "*.tf" -o -name "*.tfvars" \) | grep -q .; then
            echo "Terraform files detected"
            ((IAC_COUNT++))
          fi
          if find . \( -name "*.bicep" -o -name "*.json" \) | xargs grep -l "Microsoft.Resources" 2>/dev/null | grep -q .; then
            echo "Azure Bicep/ARM templates detected"
            ((IAC_COUNT++))
          fi
          if find . \( -name "docker-compose*.yml" -o -name "Dockerfile*" \) | grep -q .; then
            echo "Docker files detected"
            ((IAC_COUNT++))
          fi
          if find . \( -name "*.yaml" -o -name "*.yml" \) | xargs grep -l "apiVersion:" 2>/dev/null | grep -q .; then
            echo "Kubernetes manifests detected"
            ((IAC_COUNT++))
          fi
          
          if [ $IAC_COUNT -gt 0 ]; then
            echo "has_iac=true" >> $GITHUB_OUTPUT
            echo "Found IaC files, will proceed with scan"
          else
            echo "has_iac=false" >> $GITHUB_OUTPUT
            echo "No IaC files detected, skipping scan"
          fi
      
      - name: Run IaC security scan
        if: steps.detect.outputs.has_iac == 'true'
        id: iac-scan
        shell: bash
        run: |
          mkdir -p ./security-reports

          echo "Running Trivy filesystem scan for IaC misconfigurations..."
          docker run --rm \
            -v "$(pwd):/workspace" \
            aquasec/trivy:latest fs /workspace \
            --scanners misconfig \
            --format sarif \
            --output /workspace/security-reports/iac-trivy.sarif \
            --severity MEDIUM,HIGH,CRITICAL \
            --exit-code 0

          # Count findings
          FINDING_COUNT=0
          if [ -f "./security-reports/iac-trivy.sarif" ]; then
            FINDING_COUNT=$(python3 -c "
          import json
          with open('./security-reports/iac-trivy.sarif') as f:
              sarif = json.load(f)
          total = sum(len(r.get('results', [])) for r in sarif.get('runs', []))
          print(total)
          " 2>/dev/null || echo "0")
          fi

          echo "iac_finding_count=$FINDING_COUNT" >> $GITHUB_OUTPUT
          echo "Found $FINDING_COUNT IaC misconfigurations"
          if [ "$FINDING_COUNT" -gt 0 ]; then
            echo "::warning::Found $FINDING_COUNT IaC misconfigurations"
          fi

      - name: Upload IaC SARIF to GitHub Security
        if: steps.detect.outputs.has_iac == 'true'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./security-reports/iac-trivy.sarif
          category: nightly-iac
      
      - name: Upload IaC scan report
        if: steps.detect.outputs.has_iac == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: iac-security-report
          path: ./security-reports/iac-trivy.sarif
          retention-days: 90
  
  consolidate-and-report:
    name: Consolidate Security Reports
    needs: [dependency-scan, sast-analysis, secret-scan, iac-security-scan]
    if: always()
    runs-on: ${{ inputs.runs-on }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download all security reports
        uses: actions/download-artifact@v4
        with:
          path: ./all-security-reports
      
      - name: Consolidate security findings
        id: consolidate
        shell: bash
        run: |
          SCAN_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TOTAL_ISSUES=0

          # Count vulnerability findings
          VULN_COUNT=0
          if [ -f "./all-security-reports/vulnerability-report/vulnerabilities.json" ]; then
            VULN_COUNT=$(python3 -c "
          import json
          with open('./all-security-reports/vulnerability-report/vulnerabilities.json') as f:
              d = json.load(f)
          print(d.get('vulnerability_count', 0))
          " 2>/dev/null || echo "0")
          fi

          # Count SAST findings from SARIF
          SAST_COUNT=0
          for sarif in ./all-security-reports/sast-report/*.sarif; do
            if [ -f "$sarif" ]; then
              COUNT=$(python3 -c "
          import json
          with open('$sarif') as f:
              d = json.load(f)
          print(sum(len(r.get('results', [])) for r in d.get('runs', [])))
          " 2>/dev/null || echo "0")
              SAST_COUNT=$((SAST_COUNT + COUNT))
            fi
          done

          # Count secret findings
          SECRET_COUNT=0
          if [ -f "./all-security-reports/secret-scan-report/secrets-scan.sarif" ]; then
            SECRET_COUNT=$(python3 -c "
          import json
          with open('./all-security-reports/secret-scan-report/secrets-scan.sarif') as f:
              d = json.load(f)
          print(sum(len(r.get('results', [])) for r in d.get('runs', [])))
          " 2>/dev/null || echo "0")
          fi

          # Count IaC findings
          IAC_COUNT=0
          if [ -f "./all-security-reports/iac-security-report/iac-trivy.sarif" ]; then
            IAC_COUNT=$(python3 -c "
          import json
          with open('./all-security-reports/iac-security-report/iac-trivy.sarif') as f:
              d = json.load(f)
          print(sum(len(r.get('results', [])) for r in d.get('runs', [])))
          " 2>/dev/null || echo "0")
          fi

          TOTAL_ISSUES=$((VULN_COUNT + SAST_COUNT + SECRET_COUNT + IAC_COUNT))

          cat > ./consolidated-security-report.json <<EOF
          {
            "scan_date": "$SCAN_DATE",
            "repository": "${{ github.repository }}",
            "summary": {
              "total_issues": $TOTAL_ISSUES,
              "vulnerabilities": $VULN_COUNT,
              "sast_findings": $SAST_COUNT,
              "secrets_detected": $SECRET_COUNT,
              "iac_misconfigurations": $IAC_COUNT
            },
            "job_results": {
              "dependency_scan": "${{ needs.dependency-scan.result }}",
              "sast_analysis": "${{ needs.sast-analysis.result }}",
              "secret_scan": "${{ needs.secret-scan.result }}",
              "iac_security_scan": "${{ needs.iac-security-scan.result }}"
            }
          }
          EOF

          echo "total_issues=$TOTAL_ISSUES" >> $GITHUB_OUTPUT
          echo "vuln_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          echo "sast_count=$SAST_COUNT" >> $GITHUB_OUTPUT
          echo "secret_count=$SECRET_COUNT" >> $GITHUB_OUTPUT
          echo "iac_count=$IAC_COUNT" >> $GITHUB_OUTPUT
      
      - name: Generate summary
        shell: bash
        run: |
          TOTAL="${{ steps.consolidate.outputs.total_issues }}"
          VULN="${{ steps.consolidate.outputs.vuln_count }}"
          SAST="${{ steps.consolidate.outputs.sast_count }}"
          SECRETS="${{ steps.consolidate.outputs.secret_count }}"
          IAC="${{ steps.consolidate.outputs.iac_count }}"

          {
            echo "# 🔒 Nightly Security Scan Results"
            echo ""
            echo "**Repository:** \`${{ github.repository }}\`"
            echo "**Scan Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo "**Total Issues:** $TOTAL"
            echo ""
            echo "## Scan Summary"
            echo ""
            echo "| Scanner | Status | Findings |"
            echo "|---------|--------|----------|"
            echo "| Dependency Scan | ${{ needs.dependency-scan.result }} | $VULN vulnerable packages |"
            echo "| SAST (CodeQL) | ${{ needs.sast-analysis.result }} | $SAST findings |"
            echo "| Secret Scan (gitleaks) | ${{ needs.secret-scan.result }} | $SECRETS secrets |"
            echo "| IaC Scan (Trivy) | ${{ needs.iac-security-scan.result }} | $IAC misconfigurations |"
            echo ""
            if [ "$TOTAL" -gt 0 ]; then
              echo "> ⚠️ **$TOTAL total issues found.** Download artifacts for detailed reports."
            else
              echo "> ✅ **No issues found.** All scans passed cleanly."
            fi
          } >> $GITHUB_STEP_SUMMARY
      
      - name: Create GitHub issue for findings
        if: ${{ inputs.create-issues && steps.consolidate.outputs.total_issues > 0 }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github-token || github.token }}
        run: |
          TOTAL="${{ steps.consolidate.outputs.total_issues }}"
          VULN="${{ steps.consolidate.outputs.vuln_count }}"
          SAST="${{ steps.consolidate.outputs.sast_count }}"
          SECRETS="${{ steps.consolidate.outputs.secret_count }}"
          IAC="${{ steps.consolidate.outputs.iac_count }}"
          SCAN_DATE=$(date -u +"%Y-%m-%d")
          TITLE="🔒 Nightly Security Scan - $SCAN_DATE - $TOTAL issues found"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          BODY="## Nightly Security Scan Results

          **Date:** $SCAN_DATE
          **Total Issues:** $TOTAL
          **Run:** $RUN_URL

          ### Breakdown

          | Scanner | Findings |
          |---------|----------|
          | Vulnerable Dependencies | $VULN |
          | SAST (CodeQL) | $SAST |
          | Secrets (gitleaks) | $SECRETS |
          | IaC Misconfigurations (Trivy) | $IAC |

          ### Next Steps
          1. Download artifacts from the [workflow run]($RUN_URL) for detailed reports
          2. Triage and prioritize findings
          3. Address critical and high severity items first

          ---
          *This issue was created automatically by the nightly security scan.*"

          # Check for existing open issue with the security label
          EXISTING=$(gh issue list --label "security,automated" --state open --limit 1 --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "Updating existing issue #$EXISTING"
            gh issue comment "$EXISTING" --body "$BODY"
          else
            echo "Creating new security issue"
            # Ensure labels exist before creating issue
            gh label create "security" --color "d93f0b" --description "Security findings" 2>/dev/null || true
            gh label create "automated" --color "0e8a16" --description "Automated issue" 2>/dev/null || true
            gh issue create \
              --title "$TITLE" \
              --body "$BODY" \
              --label "security,automated"
          fi
      
      - name: Upload consolidated report
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-security-report
          path: ./consolidated-security-report.*
          retention-days: 90

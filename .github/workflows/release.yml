# ==============================================================================
# Release Workflow
# ==============================================================================
# Purpose:
#   Comprehensive release validation and artifact publication.
#   Runs on version tags and performs all checks required for production release.
#
# Responsibilities:
#   - Build and run full test suite
#   - Generate SBOM (Software Bill of Materials)
#   - Run dependency vulnerability scan
#   - Run license compliance checks
#   - Build and scan container images (if applicable)
#   - Optionally trigger smoke tests
#   - Publish release artifacts
#
# Target:
#   Any repo that produces shippable artifacts (libraries, apps, containers)
#
# Triggers:
#   - This workflow is reusable via workflow_call
#   - Consuming repos should trigger on push to version tags (e.g., v*)
#
# Usage Example:
#   See docs/consumer-usage.md for sample consumer workflows
# ==============================================================================

name: Release

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: 'The .NET SDK version to use'
        required: false
        type: string
        default: '10.0.x'
      
      configuration:
        description: 'Build configuration (always Release for production)'
        required: false
        type: string
        default: 'Release'
      
      runs-on:
        description: 'GitHub runner to use'
        required: false
        type: string
        default: 'ubuntu-latest'
      
      working-directory:
        description: 'Working directory for all operations'
        required: false
        type: string
        default: '.'
      
      project-path:
        description: 'Path to solution or project file (auto-detected if not specified)'
        required: false
        type: string
        default: ''
      
      package-version:
        description: 'Version for packages (auto-detected from tag if not specified)'
        required: false
        type: string
        default: ''
      
      enable-nuget-publish:
        description: 'Publish NuGet packages'
        required: false
        type: boolean
        default: false
      
      nuget-source:
        description: 'NuGet feed URL'
        required: false
        type: string
        default: 'https://api.nuget.org/v3/index.json'
      
      enable-container-build:
        description: 'Build and scan container images'
        required: false
        type: boolean
        default: false
      
      dockerfile-path:
        description: 'Path to Dockerfile (required if enable-container-build is true)'
        required: false
        type: string
        default: './Dockerfile'
      
      docker-build-context:
        description: 'Docker build context directory (defaults to working-directory)'
        required: false
        type: string
        default: ''
      
      container-registry:
        description: 'Container registry (e.g., ghcr.io, docker.io)'
        required: false
        type: string
        default: 'ghcr.io'

      azure-client-id:
        description: 'Azure AD application (client) ID for OIDC federation when publishing to ACR'
        required: false
        type: string
        default: ''

      azure-tenant-id:
        description: 'Azure AD tenant ID for OIDC federation when publishing to ACR'
        required: false
        type: string
        default: ''

      azure-subscription-id:
        description: 'Azure subscription ID for OIDC federation when publishing to ACR'
        required: false
        type: string
        default: ''
      
      container-image-name:
        description: 'Container image name (required if enable-container-build is true)'
        required: false
        type: string
        default: ''
      
      enable-app-publish:
        description: 'Publish deployable app artifacts (workers, web APIs)'
        required: false
        type: boolean
        default: false
      
      publish-projects:
        description: 'Semicolon-separated project paths to publish (e.g., src/Worker/Worker.csproj;src/Api/Api.csproj)'
        required: false
        type: string
        default: ''
      
      publish-self-contained:
        description: 'Create self-contained deployments for app publish'
        required: false
        type: boolean
        default: false
      
      publish-runtime:
        description: 'Target runtime for app publish (e.g., linux-x64, win-x64)'
        required: false
        type: string
        default: 'linux-x64'
      
      enable-smoke-tests:
        description: 'Run smoke tests after deployment'
        required: false
        type: boolean
        default: false
      
      smoke-test-url:
        description: 'URL for smoke tests (required if enable-smoke-tests is true)'
        required: false
        type: string
        default: ''
      
      actions-ref:
        description: 'Git ref of HoneyDrunk.Actions to use'
        required: false
        type: string
        default: 'main'
    
    secrets:
      nuget-api-key:
        description: 'API key for NuGet feed'
        required: false
      
      container-registry-username:
        description: 'Container registry username (for non-Azure registries or admin auth)'
        required: false
      
      container-registry-password:
        description: 'Container registry password or token (for non-Azure registries or admin auth)'
        required: false

permissions:
  contents: read
  packages: write
  id-token: write  # Required for OIDC federation and SBOM attestation
  security-events: write  # For SARIF upload from container scan

jobs:
  build-and-test:
    name: Build and Full Test Suite
    runs-on: ${{ inputs.runs-on }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Checkout HoneyDrunk.Actions
        uses: actions/checkout@v4
        with:
          repository: HoneyDrunkStudios/HoneyDrunk.Actions
          path: .github/actions-repo
          ref: ${{ inputs.actions-ref }}
      
      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.package-version }}" ]; then
            VERSION="${{ inputs.package-version }}"
          elif [ -n "${{ github.ref_name }}" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # Remove leading 'v' if present
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"
      
      - name: Setup .NET SDK
        uses: ./.github/actions-repo/.github/actions/dotnet/setup
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      
      - name: Setup NuGet cache
        uses: ./.github/actions-repo/.github/actions/nuget/setup-cache
        with:
          working-directory: ${{ inputs.working-directory }}
      
      - name: Restore dependencies
        uses: ./.github/actions-repo/.github/actions/dotnet/restore
        with:
          working-directory: ${{ inputs.working-directory }}
          project-path: ${{ inputs.project-path }}
      
      - name: Build solution
        uses: ./.github/actions-repo/.github/actions/dotnet/build
        with:
          configuration: ${{ inputs.configuration }}
          no-restore: 'true'
          working-directory: ${{ inputs.working-directory }}
          project-path: ${{ inputs.project-path }}
      
      - name: Run full test suite
        uses: ./.github/actions-repo/.github/actions/dotnet/test
        with:
          configuration: ${{ inputs.configuration }}
          no-build: 'true'
          collect-coverage: 'true'
          working-directory: ${{ inputs.working-directory }}
          project-path: ${{ inputs.project-path }}
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-release
          path: ${{ inputs.working-directory }}/TestResults/**/*
          retention-days: 90  # Long retention for release artifacts
          if-no-files-found: ignore
      
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-release
          path: ${{ inputs.working-directory }}/TestResults/**/coverage.cobertura.xml
          retention-days: 90
          if-no-files-found: ignore
    
    outputs:
      version: ${{ steps.version.outputs.version }}
  
  security-compliance:
    name: Security and Compliance
    needs: [build-and-test]
    runs-on: ${{ inputs.runs-on }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Checkout HoneyDrunk.Actions
        uses: actions/checkout@v4
        with:
          repository: HoneyDrunkStudios/HoneyDrunk.Actions
          path: .github/actions-repo
          ref: ${{ inputs.actions-ref }}
      
      - name: Setup .NET SDK
        uses: ./.github/actions-repo/.github/actions/dotnet/setup
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      
      - name: Restore dependencies
        uses: ./.github/actions-repo/.github/actions/dotnet/restore
        with:
          working-directory: ${{ inputs.working-directory }}
          project-path: ${{ inputs.project-path }}
      
      - name: Run dependency vulnerability scan
        uses: ./.github/actions-repo/.github/actions/security/vulnerability-scan
        with:
          working-directory: ${{ inputs.working-directory }}
          project-path: ${{ inputs.project-path }}
          fail-on-severity: 'moderate'  # Stricter for releases
      
      - name: Create artifacts directory
        shell: bash
        run: mkdir -p "${{ inputs.working-directory }}/artifacts"

      - name: Generate SBOM
        shell: bash
        env:
          SYFT_VERSION: v1.44.0
        run: |
          set -euo pipefail
          curl -sSfL "https://raw.githubusercontent.com/anchore/syft/main/install.sh" | sh -s -- -b "$RUNNER_TEMP/syft" "$SYFT_VERSION"
          "$RUNNER_TEMP/syft/syft" "dir:${{ inputs.working-directory }}"             --output "spdx-json=${{ inputs.working-directory }}/artifacts/sbom.spdx.json"

      - name: Run license compliance check
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          dotnet tool install --global dotnet-project-licenses 2>/dev/null || true

          TARGET="${{ inputs.project-path }}"
          if [ -z "$TARGET" ]; then
            TARGET=$(find . -maxdepth 4 \( -name "*.sln" -o -name "*.slnx" \) | head -n 1 || true)
          fi

          mkdir -p ./artifacts

          echo "Scanning licenses for: $TARGET"
          dotnet-project-licenses \
            --input "$TARGET" \
            --output-directory ./artifacts \
            --json \
            --include-transitive \
            || true

          # Check for disallowed licenses
          ALLOWED="MIT|Apache-2.0|BSD-2-Clause|BSD-3-Clause|ISC|MS-PL|MS-EULA|Unlicense"
          if [ -f "./artifacts/licenses.json" ]; then
            cat > /tmp/check_licenses.py << 'PYEOF'
          import json, re, sys
          allowed = re.compile(sys.argv[1], re.IGNORECASE)
          with open(sys.argv[2]) as f:
              data = json.load(f)
          violations = [p for p in data if not allowed.search(p.get("LicenseType", ""))]
          for v in violations:
              name = v.get("PackageName", "?")
              lic = v.get("LicenseType", "unknown")
              print(f"  {name} - {lic}", file=sys.stderr)
          print(len(violations))
          PYEOF
            VIOLATIONS=$(python3 /tmp/check_licenses.py "$ALLOWED" "./artifacts/licenses.json" 2>/dev/null | tail -1 || echo "0")

            if [ "$VIOLATIONS" -gt 0 ]; then
              echo "::warning::Found $VIOLATIONS package(s) with licenses outside the allow list"
            else
              echo "✅ All package licenses are within the allow list"
            fi
          fi

          # Rename output for consistent artifact naming
          if [ -f "./artifacts/licenses.json" ]; then
            cp ./artifacts/licenses.json ./artifacts/license-report.json
          fi
      
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: ${{ inputs.working-directory }}/artifacts/sbom.spdx.json
          retention-days: 365  # Keep SBOMs for a year
      
      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: ${{ inputs.working-directory }}/artifacts/license-report.json
          retention-days: 90
          if-no-files-found: ignore
  
  publish-nuget:
    name: Publish NuGet Packages
    if: ${{ inputs.enable-nuget-publish }}
    needs: [build-and-test, security-compliance]
    runs-on: ${{ inputs.runs-on }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Checkout HoneyDrunk.Actions
        uses: actions/checkout@v4
        with:
          repository: HoneyDrunkStudios/HoneyDrunk.Actions
          path: .github/actions-repo
          ref: ${{ inputs.actions-ref }}
      
      - name: Setup .NET SDK
        uses: ./.github/actions-repo/.github/actions/dotnet/setup
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      
      - name: Restore dependencies
        uses: ./.github/actions-repo/.github/actions/dotnet/restore
        with:
          working-directory: ${{ inputs.working-directory }}
          project-path: ${{ inputs.project-path }}
      
      - name: Build project
        uses: ./.github/actions-repo/.github/actions/dotnet/build
        with:
          configuration: ${{ inputs.configuration }}
          no-restore: 'true'
          working-directory: ${{ inputs.working-directory }}
          project-path: ${{ inputs.project-path }}
      
      - name: Pack project
        uses: ./.github/actions-repo/.github/actions/dotnet/pack
        with:
          project-path: ${{ inputs.project-path }}
          configuration: ${{ inputs.configuration }}
          version: ${{ needs.build-and-test.outputs.version }}
          output-directory: ./artifacts
          working-directory: ${{ inputs.working-directory }}
      
      - name: Push to NuGet
        uses: ./.github/actions-repo/.github/actions/nuget/push
        with:
          package-path: './artifacts/*.nupkg'
          source: ${{ inputs.nuget-source }}
          api-key: ${{ secrets.nuget-api-key }}
          skip-duplicate: 'false'  # Releases should fail if version exists
          working-directory: ${{ inputs.working-directory }}
      
      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{ inputs.working-directory }}/artifacts/*.nupkg
          retention-days: 365
  
  publish-app:
    name: Publish Deployable Apps
    if: ${{ inputs.enable-app-publish }}
    needs: [build-and-test, security-compliance]
    runs-on: ${{ inputs.runs-on }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Checkout HoneyDrunk.Actions
        uses: actions/checkout@v4
        with:
          repository: HoneyDrunkStudios/HoneyDrunk.Actions
          path: .github/actions-repo
          ref: ${{ inputs.actions-ref }}
      
      - name: Setup .NET SDK
        uses: ./.github/actions-repo/.github/actions/dotnet/setup
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      
      - name: Restore dependencies
        uses: ./.github/actions-repo/.github/actions/dotnet/restore
        with:
          working-directory: ${{ inputs.working-directory }}
          project-path: ${{ inputs.project-path }}
      
      - name: Publish projects
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          VERSION="${{ needs.build-and-test.outputs.version }}"
          
          RAW_PROJECTS="${{ inputs.publish-projects }}"
          CLEANED="$(echo "$RAW_PROJECTS" | tr -d '[:space:];')"
          if [ -z "$CLEANED" ]; then
            echo "::error::publish-projects is empty but enable-app-publish is true. Specify at least one project path (semicolon-separated)."
            exit 1
          fi
          
          IFS=';' read -ra PROJECTS <<< "$RAW_PROJECTS"
          
          for PROJECT in "${PROJECTS[@]}"; do
            PROJECT=$(echo "$PROJECT" | xargs)
            if [ -z "$PROJECT" ]; then continue; fi
            
            PROJECT_NAME=$(basename "$PROJECT" .csproj)
            OUTPUT_DIR="./publish-output/$PROJECT_NAME"
            
            echo "Publishing $PROJECT_NAME..."
            
            ARGS="$PROJECT --configuration ${{ inputs.configuration }} --no-restore --output $OUTPUT_DIR /p:Version=$VERSION"
            
            if [ -n "${{ inputs.publish-runtime }}" ]; then
              ARGS="$ARGS --runtime ${{ inputs.publish-runtime }}"
            fi
            
            if [ "${{ inputs.publish-self-contained }}" == "true" ]; then
              ARGS="$ARGS --self-contained"
            else
              ARGS="$ARGS --no-self-contained"
            fi
            
            dotnet publish $ARGS
            echo "  -> Published to $OUTPUT_DIR"
          done
      
      - name: Upload published apps
        uses: actions/upload-artifact@v4
        with:
          name: published-apps
          path: ${{ inputs.working-directory }}/publish-output/
          retention-days: 90
  
  build-and-scan-container:
    name: Build and Scan Container
    if: ${{ inputs.enable-container-build }}
    needs: [build-and-test, security-compliance]
    runs-on: ${{ inputs.runs-on }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Checkout HoneyDrunk.Actions
        uses: actions/checkout@v4
        with:
          repository: HoneyDrunkStudios/HoneyDrunk.Actions
          path: .github/actions-repo
          ref: ${{ inputs.actions-ref }}
      
      - name: Validate container inputs
        shell: bash
        run: |
          if [ -z "${{ inputs.container-image-name }}" ]; then
            echo "::error::container-image-name is required when enable-container-build is true"
            exit 1
          fi
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Azure Container Registry
        if: ${{ endsWith(inputs.container-registry, '.azurecr.io') }}
        uses: ./.github/actions-repo/.github/actions/azure/acr-login
        with:
          registry: ${{ inputs.container-registry }}
          client-id: ${{ inputs.azure-client-id }}
          tenant-id: ${{ inputs.azure-tenant-id }}
          subscription-id: ${{ inputs.azure-subscription-id }}

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.container-registry == 'ghcr.io' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to external container registry
        if: ${{ inputs.container-registry != 'ghcr.io' && !endsWith(inputs.container-registry, '.azurecr.io') }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.container-registry }}
          username: ${{ secrets.container-registry-username }}
          password: ${{ secrets.container-registry-password }}
      
      - name: Build and tag container image
        id: container_tags
        shell: bash
        run: |
          IMAGE_TAG="${{ inputs.container-registry }}/${{ inputs.container-image-name }}:${{ needs.build-and-test.outputs.version }}"
          LATEST_TAG="${{ inputs.container-registry }}/${{ inputs.container-image-name }}:latest"
          
          BUILD_CONTEXT="${{ inputs.docker-build-context }}"
          if [ -z "$BUILD_CONTEXT" ]; then
            BUILD_CONTEXT="${{ inputs.working-directory }}"
          fi
          
          docker buildx build \
            --file ${{ inputs.dockerfile-path }} \
            --tag "$IMAGE_TAG" \
            --tag "$LATEST_TAG" \
            --load \
            "$BUILD_CONTEXT"
          
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
      
      - name: Scan container image for vulnerabilities
        shell: bash
        env:
          TRIVY_IMAGE: aquasec/trivy:0.69.3
        run: |
          set -euo pipefail
          docker run --rm             -v "$PWD:/workspace"             -v /var/run/docker.sock:/var/run/docker.sock             -w /workspace             "$TRIVY_IMAGE"             image             --format sarif             --output container-scan.sarif             --severity HIGH,CRITICAL             --exit-code 1             "${{ steps.container_tags.outputs.image_tag }}"

      - name: Upload container scan to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: container-scan.sarif

      - name: Upload container scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-vulnerability-report
          path: container-scan.sarif
          retention-days: 90
          if-no-files-found: ignore
      
      - name: Push container image
        shell: bash
        run: |
          docker push "${{ steps.container_tags.outputs.image_tag }}"
          docker push "${{ steps.container_tags.outputs.latest_tag }}"
          echo "Pushed container images:"
          echo "  - ${{ steps.container_tags.outputs.image_tag }}"
          echo "  - ${{ steps.container_tags.outputs.latest_tag }}"
  
  smoke-tests:
    name: Smoke Tests
    if: ${{ always() && inputs.enable-smoke-tests && !failure() && !cancelled() }}
    needs: [publish-nuget, publish-app, build-and-scan-container]
    runs-on: ${{ inputs.runs-on }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Validate smoke test inputs
        if: ${{ inputs.smoke-test-url == '' }}
        shell: bash
        run: |
          echo "::error::smoke-test-url is required when enable-smoke-tests is true"
          exit 1
      
      - name: Wait for deployment
        shell: bash
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 30
      
      - name: Run smoke tests
        shell: bash
        run: |
          SMOKE_URL="${{ inputs.smoke-test-url }}"
          TIMEOUT=300
          INTERVAL=10
          ELAPSED=0

          echo "Running smoke tests against: $SMOKE_URL"
          echo "Timeout: ${TIMEOUT}s"

          while [ $ELAPSED -lt $TIMEOUT ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$SMOKE_URL" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "✅ Smoke test passed (HTTP $HTTP_CODE) after ${ELAPSED}s"
              exit 0
            fi

            echo "  HTTP $HTTP_CODE — retrying in ${INTERVAL}s (${ELAPSED}s elapsed)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::error::Smoke test failed — $SMOKE_URL did not return 2xx/3xx within ${TIMEOUT}s"
          exit 1
  
  release-summary:
    name: Release Summary
    needs: [build-and-test, security-compliance, publish-nuget, publish-app, build-and-scan-container]
    if: always()
    runs-on: ${{ inputs.runs-on }}
    
    steps:
      - name: Generate release summary
        shell: bash
        run: |
          echo "# Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.build-and-test.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Configuration:** ${{ inputs.configuration }}" >> $GITHUB_STEP_SUMMARY
          echo "**Ref:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "- Build and Test: ${{ needs.build-and-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security and Compliance: ${{ needs.security-compliance.result }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.enable-nuget-publish }}" == "true" ]; then
            echo "- NuGet Publish: ${{ needs.publish-nuget.result }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ inputs.enable-app-publish }}" == "true" ]; then
            echo "- App Publish: ${{ needs.publish-app.result }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ inputs.enable-container-build }}" == "true" ]; then
            echo "- Container Build: ${{ needs.build-and-scan-container.result }}" >> $GITHUB_STEP_SUMMARY
          fi

# ==============================================================================
# Secret Scan Job
# ==============================================================================
# Purpose:
#   Scan for secrets and credentials in code changes using gitleaks.
#
# Single Responsibility:
#   Secret detection only — uses gitleaks for pattern-based scanning
# ==============================================================================

name: Secret Scan (Job)

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'GitHub runner to use'
        required: false
        type: string
        default: 'ubuntu-latest'
      
      scan-mode:
        description: 'Scan mode: diff-only or full'
        required: false
        type: string
        default: 'diff-only'
      
      base-ref:
        description: 'Base ref for diff scan (auto-detected for PRs)'
        required: false
        type: string
        default: ''
      
      gitleaks-config:
        description: 'Path to custom gitleaks config file (.gitleaks.toml). Empty uses default rules.'
        required: false
        type: string
        default: ''
    
    outputs:
      has-warnings:
        description: 'Whether secrets were detected'
        value: ${{ jobs.secret-scan.outputs.has-warnings }}
      warning-messages:
        description: 'Summary of findings'
        value: ${{ jobs.secret-scan.outputs.warning-messages }}

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ${{ inputs.runs-on }}
    outputs:
      has-warnings: ${{ steps.evaluate.outputs.has-warnings }}
      warning-messages: ${{ steps.evaluate.outputs.warning-messages }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.scan-mode == 'full' && 0 || 0 }}

      - name: Run gitleaks scan
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: >-
            ${{ inputs.scan-mode == 'full' && '--no-git' || format('--log-opts={0}..HEAD', inputs.base-ref || github.event.pull_request.base.sha || 'HEAD~1') }}
            ${{ inputs.gitleaks-config != '' && format('--config={0}', inputs.gitleaks-config) || '' }}
            --report-format sarif
            --report-path gitleaks-report.sarif
            --exit-code 0
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE || '' }}

      - name: Upload SARIF report
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-report.sarif

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          retention-days: 90
          if-no-files-found: ignore

      - name: Evaluate results
        id: evaluate
        if: always()
        shell: bash
        run: |
          if [ -f "gitleaks-report.sarif" ]; then
            # Count findings from SARIF
            FINDINGS=$(python3 -c "
          import json, sys
          with open('gitleaks-report.sarif') as f:
              data = json.load(f)
          count = sum(len(run.get('results', [])) for run in data.get('runs', []))
          print(count)
          " 2>/dev/null || echo "0")

            if [ "$FINDINGS" -gt 0 ]; then
              echo "has-warnings=true" >> "$GITHUB_OUTPUT"
              echo "warning-messages=Gitleaks found $FINDINGS potential secret(s). Review the SARIF report artifact." >> "$GITHUB_OUTPUT"
              echo "::warning::Gitleaks detected $FINDINGS potential secret(s)"
            else
              echo "has-warnings=false" >> "$GITHUB_OUTPUT"
              echo "warning-messages=" >> "$GITHUB_OUTPUT"
              echo "✅ No secrets detected"
            fi
          else
            echo "has-warnings=false" >> "$GITHUB_OUTPUT"
            echo "warning-messages=" >> "$GITHUB_OUTPUT"
            echo "✅ No SARIF report generated — scan clean"
          fi

# ==============================================================================
# Secret Scan Job
# ==============================================================================
# Purpose:
#   Scan for secrets and credentials in code changes using gitleaks.
#
# Single Responsibility:
#   Secret detection only — uses gitleaks CLI for pattern-based scanning
# ==============================================================================

name: Secret Scan (Job)

on:
  workflow_call:
    inputs:
      # Ignored — secret scanning always runs on ubuntu-latest regardless of
      # what the calling workflow uses for builds. Kept for API compatibility.
      runs-on:
        description: 'GitHub runner to use (ignored; always ubuntu-latest)'
        required: false
        type: string
        default: 'ubuntu-latest'

      scan-mode:
        description: 'Scan mode: diff-only or full'
        required: false
        type: string
        default: 'diff-only'

      base-ref:
        description: 'Base ref for diff scan (auto-detected for PRs)'
        required: false
        type: string
        default: ''

      gitleaks-config:
        description: 'Path to custom gitleaks config file (.gitleaks.toml). Empty uses default rules.'
        required: false
        type: string
        default: ''

      gitleaks-version:
        description: 'Gitleaks version to install (e.g. v8.18.4). Defaults to latest.'
        required: false
        type: string
        default: 'latest'

      # Accepted but unused — callers that pass actions-ref for other jobs
      # can include it here without causing a validation error.
      actions-ref:
        description: 'Unused. Accepted for caller compatibility.'
        required: false
        type: string
        default: ''

    outputs:
      has-warnings:
        description: 'Whether secrets were detected'
        value: ${{ jobs.secret-scan.outputs.has-warnings }}
      warning-messages:
        description: 'Summary of findings'
        value: ${{ jobs.secret-scan.outputs.warning-messages }}

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    outputs:
      has-warnings: ${{ steps.evaluate.outputs.has-warnings }}
      warning-messages: ${{ steps.evaluate.outputs.warning-messages }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_VERSION: ${{ inputs.gitleaks-version }}
        run: |
          set -euo pipefail

          if [ "$GITLEAKS_VERSION" = "latest" ]; then
            VERSION=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name)
          else
            VERSION="$GITLEAKS_VERSION"
          fi

          TARBALL="gitleaks_${VERSION#v}_linux_x64.tar.gz"
          BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/${VERSION}"

          curl -sSfL "${BASE_URL}/${TARBALL}" -o "/tmp/${TARBALL}"
          curl -sSfL "${BASE_URL}/gitleaks_${VERSION#v}_checksums.txt" -o /tmp/gitleaks_checksums.txt

          cd /tmp
          grep "  ${TARBALL}$" gitleaks_checksums.txt | sha256sum -c -
          tar -xzf "${TARBALL}" -C /tmp gitleaks
          cd -

          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          echo "Installed gitleaks ${VERSION} (checksum verified)"

      - name: Run gitleaks scan
        id: gitleaks
        shell: bash
        run: |
          BASE="${{ inputs.base-ref || github.event.pull_request.base.sha || 'HEAD~1' }}"

          if [ "${{ inputs.scan-mode }}" = "full" ]; then
            LOG_OPTS="--full-history"
          else
            LOG_OPTS="--log-opts=${BASE}..HEAD"
          fi

          CONFIG_FLAG=""
          if [ -n "${{ inputs.gitleaks-config }}" ]; then
            CONFIG_FLAG="--config=${{ inputs.gitleaks-config }}"
          fi

          gitleaks detect \
            $LOG_OPTS \
            $CONFIG_FLAG \
            --report-format json \
            --report-path gitleaks-report.json \
            --exit-code 0

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Evaluate results
        id: evaluate
        if: always()
        shell: bash
        run: |
          if [ -f "gitleaks-report.json" ]; then
            FINDINGS=$(jq 'if type == "array" then length else 0 end' gitleaks-report.json 2>/dev/null || echo "0")

            if [ "$FINDINGS" -gt 0 ]; then
              echo "has-warnings=true" >> "$GITHUB_OUTPUT"
              echo "warning-messages=Gitleaks found $FINDINGS potential secret(s). Review the gitleaks-report artifact." >> "$GITHUB_OUTPUT"
              echo "::warning::Gitleaks detected $FINDINGS potential secret(s)"
            else
              echo "has-warnings=false" >> "$GITHUB_OUTPUT"
              echo "warning-messages=" >> "$GITHUB_OUTPUT"
              echo "✅ No secrets detected"
            fi
          else
            echo "has-warnings=false" >> "$GITHUB_OUTPUT"
            echo "warning-messages=" >> "$GITHUB_OUTPUT"
            echo "✅ No report generated — scan clean"
          fi

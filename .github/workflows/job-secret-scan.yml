# ==============================================================================
# Secret Scan Job
# ==============================================================================
# Purpose:
#   Scan for secrets and credentials in code changes using gitleaks.
#
# Single Responsibility:
#   Secret detection only — uses gitleaks CLI for pattern-based scanning
# ==============================================================================

name: Secret Scan (Job)

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'GitHub runner to use'
        required: false
        type: string
        default: 'ubuntu-latest'

      scan-mode:
        description: 'Scan mode: diff-only or full'
        required: false
        type: string
        default: 'diff-only'

      base-ref:
        description: 'Base ref for diff scan (auto-detected for PRs)'
        required: false
        type: string
        default: ''

      gitleaks-config:
        description: 'Path to custom gitleaks config file (.gitleaks.toml). Empty uses default rules.'
        required: false
        type: string
        default: ''

    outputs:
      has-warnings:
        description: 'Whether secrets were detected'
        value: ${{ jobs.secret-scan.outputs.has-warnings }}
      warning-messages:
        description: 'Summary of findings'
        value: ${{ jobs.secret-scan.outputs.warning-messages }}

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ${{ inputs.runs-on }}
    outputs:
      has-warnings: ${{ steps.evaluate.outputs.has-warnings }}
      warning-messages: ${{ steps.evaluate.outputs.warning-messages }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name)
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks scan
        id: gitleaks
        shell: bash
        run: |
          BASE="${{ inputs.base-ref || github.event.pull_request.base.sha || 'HEAD~1' }}"

          if [ "${{ inputs.scan-mode }}" = "full" ]; then
            LOG_OPTS=""
          else
            LOG_OPTS="--log-opts=${BASE}..HEAD"
          fi

          CONFIG_FLAG=""
          if [ -n "${{ inputs.gitleaks-config }}" ]; then
            CONFIG_FLAG="--config=${{ inputs.gitleaks-config }}"
          fi

          gitleaks detect \
            $LOG_OPTS \
            $CONFIG_FLAG \
            --report-format json \
            --report-path gitleaks-report.json \
            --exit-code 0

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Evaluate results
        id: evaluate
        if: always()
        shell: bash
        run: |
          if [ -f "gitleaks-report.json" ]; then
            FINDINGS=$(jq 'if type == "array" then length else 0 end' gitleaks-report.json 2>/dev/null || echo "0")

            if [ "$FINDINGS" -gt 0 ]; then
              echo "has-warnings=true" >> "$GITHUB_OUTPUT"
              echo "warning-messages=Gitleaks found $FINDINGS potential secret(s). Review the gitleaks-report artifact." >> "$GITHUB_OUTPUT"
              echo "::warning::Gitleaks detected $FINDINGS potential secret(s)"
            else
              echo "has-warnings=false" >> "$GITHUB_OUTPUT"
              echo "warning-messages=" >> "$GITHUB_OUTPUT"
              echo "✅ No secrets detected"
            fi
          else
            echo "has-warnings=false" >> "$GITHUB_OUTPUT"
            echo "warning-messages=" >> "$GITHUB_OUTPUT"
            echo "✅ No report generated — scan clean"
          fi

# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: 'Test .NET Project'
description: 'Run tests for a .NET project with coverage and result reporting'
inputs:
  configuration:
    description: 'Build configuration'
    required: false
    default: 'Release'
  no-build:
    description: 'Skip build during test'
    required: false
    default: 'false'
  test-results-directory:
    description: 'Directory to store test results'
    required: false
    default: 'TestResults'
  collect-coverage:
    description: 'Collect code coverage'
    required: false
    default: 'true'
  working-directory:
    description: 'Working directory for tests'
    required: false
    default: '.'
  project-path:
    description: 'Path to a solution or project to test (optional)'
    required: false
    default: ''
  coverage-runsettings:
    description: 'Optional runsettings file to use as the base for coverage collection. When omitted, coverlet.runsettings in the working directory is used if present.'
    required: false
    default: ''
outputs:
  tests-found:
    description: 'Whether test projects were found and executed'
    value: ${{ steps.run-tests.outputs.tests-found }}
runs:
  using: 'composite'
  steps:
    - name: Run tests
      id: run-tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        COVERAGE_RUNSETTINGS: ${{ inputs.coverage-runsettings }}
      run: |
        set -euo pipefail
        
        # Convert results directory to absolute path to ensure it's created in the working directory
        # This is critical because dotnet test with a solution may create results relative to project location
        RESULTS_DIR="$(pwd)/${{ inputs.test-results-directory }}"
        mkdir -p "$RESULTS_DIR"
        
        # Build common args
        ARGS="--configuration ${{ inputs.configuration }} --logger trx --results-directory \"$RESULTS_DIR\""
        if [ "${{ inputs.no-build }}" == "true" ]; then
          ARGS="$ARGS --no-build"
        fi
        if [ "${{ inputs.collect-coverage }}" == "true" ]; then
          # Emit both OpenCover (SonarQube Cloud native C# import format) and
          # Cobertura (coverage-baseline-ratchet.yml + report-generator consumer)
          # from a single test run while preserving repo-owned coverage scope
          # filters such as Include, ExcludeByFile, and IncludeTestAssembly.
          RUNSETTINGS="$RESULTS_DIR/coverlet.runsettings"
          BASE_RUNSETTINGS="${COVERAGE_RUNSETTINGS:-}"
          if [ -z "$BASE_RUNSETTINGS" ] && [ -f "coverlet.runsettings" ]; then
            BASE_RUNSETTINGS="$(pwd)/coverlet.runsettings"
          fi
          if [ -n "$BASE_RUNSETTINGS" ] && [ ! -f "$BASE_RUNSETTINGS" ]; then
            echo "::error::coverage-runsettings was provided but does not exist: $BASE_RUNSETTINGS"
            exit 1
          fi
          export RUNSETTINGS BASE_RUNSETTINGS
          python3 <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          target = Path(os.environ["RUNSETTINGS"])
          base = os.environ.get("BASE_RUNSETTINGS") or ""

          def child(parent, name):
              for item in list(parent):
                  if item.tag.split("}", 1)[-1] == name:
                      return item
              return None

          if base:
              tree = ET.parse(base)
              root = tree.getroot()
              print(f"Using coverage runsettings base: {base}")
          else:
              root = ET.Element("RunSettings")
              tree = ET.ElementTree(root)
              print("No coverage runsettings base found; generating default coverlet settings.")

          dc_settings = child(root, "DataCollectionRunSettings")
          if dc_settings is None:
              dc_settings = ET.SubElement(root, "DataCollectionRunSettings")
          collectors = child(dc_settings, "DataCollectors")
          if collectors is None:
              collectors = ET.SubElement(dc_settings, "DataCollectors")
          collector = None
          for item in list(collectors):
              if item.tag.split("}", 1)[-1] == "DataCollector" and item.attrib.get("friendlyName") == "XPlat Code Coverage":
                  collector = item
                  break
          if collector is None:
              collector = ET.SubElement(collectors, "DataCollector", {"friendlyName": "XPlat Code Coverage"})
          config = child(collector, "Configuration")
          if config is None:
              config = ET.SubElement(collector, "Configuration")
          fmt = child(config, "Format")
          if fmt is None:
              fmt = ET.SubElement(config, "Format")
              existing = []
          else:
              existing = [part.strip() for part in (fmt.text or "").split(",") if part.strip()]

          merged = []
          seen = set()
          for part in existing + ["opencover", "cobertura"]:
              key = part.lower()
              if key not in seen:
                  seen.add(key)
                  merged.append(part)
          fmt.text = ",".join(merged)

          ET.indent(tree, space="  ")
          target.parent.mkdir(parents=True, exist_ok=True)
          tree.write(target, encoding="utf-8", xml_declaration=True)
          PY
          ARGS="$ARGS --collect \"XPlat Code Coverage\" --settings \"$RUNSETTINGS\""
        fi
        
        TARGET="${{ inputs.project-path }}"
        if [ -n "$TARGET" ]; then
          echo "Running tests for explicit target: $TARGET"
          echo "Results will be saved to: $RESULTS_DIR"
          echo "tests-found=true" >> $GITHUB_OUTPUT
          eval "dotnet test \"$TARGET\" $ARGS" && exit 0
        fi
        
        # Try a solution first (maxdepth 4 for consistency)
        SOLN=$(find . -maxdepth 4 \( -name "*.sln" -o -name "*.slnx" \) | head -n 1 || true)
        if [ -n "$SOLN" ]; then
          echo "Detected solution: $SOLN"
          echo "Results will be saved to: $RESULTS_DIR"
          echo "tests-found=true" >> $GITHUB_OUTPUT
          eval "dotnet test \"$SOLN\" $ARGS" && exit 0
        fi
        
        # Discover test projects (maxdepth 4 for consistency with solution search)
        mapfile -t TEST_PROJECTS < <(find . -maxdepth 4 -name "*.csproj" -exec grep -l "Microsoft.NET.Test.Sdk\|MSTest.TestAdapter\|xunit\|nunit" {} \; || true)
        if [ ${#TEST_PROJECTS[@]} -eq 0 ]; then
          echo "No test projects found - skipping tests"
          echo "tests-found=false" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        echo "Discovered ${#TEST_PROJECTS[@]} test project(s). Running individually."
        echo "Results will be saved to: $RESULTS_DIR"
        echo "tests-found=true" >> $GITHUB_OUTPUT
        FAIL=0
        for PROJ in "${TEST_PROJECTS[@]}"; do
          echo "Testing: $PROJ"
          if ! eval "dotnet test \"$PROJ\" $ARGS"; then
            FAIL=1
          fi
        done
        exit $FAIL

# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: 'Initiatives Sync — Data Gathering'
description: 'Query GitHub issue states for all filed initiative packets and produce a sync report for the initiatives-sync agent'
inputs:
  arch-root:
    description: 'Path to HoneyDrunk.Architecture repo checkout'
    required: true
  actions-root:
    description: 'Path to HoneyDrunk.Actions repo checkout (contains the sync script)'
    required: true
outputs:
  report-path:
    description: 'Path to the JSON sync report'
    value: ${{ steps.gather.outputs.report-path }}
  summary:
    description: 'JSON summary of initiative progress'
    value: ${{ steps.gather.outputs.summary }}
runs:
  using: 'composite'
  steps:
    - name: Verify prerequisites
      shell: bash
      run: |
        set -euo pipefail
        command -v gh >/dev/null 2>&1 || { echo "gh CLI is required" >&2; exit 1; }
        command -v python3 >/dev/null 2>&1 || { echo "python3 is required" >&2; exit 1; }

        if [[ ! -f "${{ inputs.arch-root }}/generated/issue-packets/filed-packets.json" ]]; then
          echo "filed-packets.json not found in arch-root" >&2
          exit 1
        fi

    - name: Gather initiative state
      id: gather
      shell: bash
      env:
        ARCH_ROOT: ${{ inputs.arch-root }}
        ACTIONS_ROOT: ${{ inputs.actions-root }}
      run: |
        set -euo pipefail

        REPORT_PATH="${ARCH_ROOT}/generated/initiatives-sync-report.json"

        SUMMARY=$(python3 "${ACTIONS_ROOT}/scripts/initiatives-sync.py" \
          --arch-root "${ARCH_ROOT}" \
          --report "${REPORT_PATH}")

        echo "report-path=${REPORT_PATH}" >> "$GITHUB_OUTPUT"
        echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"

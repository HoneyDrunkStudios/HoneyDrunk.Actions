# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: 'Generate PR Summary'
description: 'Generate a summary of build and test results for PRs'
inputs:
  include-coverage:
    description: 'Include code coverage in summary'
    required: false
    default: 'true'
  test-results-directory:
    description: 'Directory containing test results'
    required: false
    default: 'TestResults'
  build-status:
    description: 'Build status (success or failure)'
    required: false
    default: 'success'
  project-name:
    description: 'Project or solution name'
    required: false
    default: ''
  coverage-gate-verdict:
    description: 'Pre-computed coverage-gate verdict line'
    required: false
    default: ''
  outdated-packages-markdown:
    description: 'Pre-rendered non-blocking outdated-NuGet package lines'
    required: false
    default: ''
outputs:
  markdown:
    description: 'Markdown content of the generated PR summary'
    value: ${{ steps.generate.outputs.content }}
runs:
  using: 'composite'
  steps:
    - name: Parse test results
      id: test-results
      shell: bash
      run: |
        set -euo pipefail
        
        # Parse TRX files for actual test counts
        TOTAL=0
        PASSED=0
        FAILED=0
        SKIPPED=0
        
        if [ -d "${{ inputs.test-results-directory }}" ]; then
          # Use find instead of globstar pattern
          while IFS= read -r trx; do
            if [ -f "$trx" ]; then
              # Parse TRX XML for test counts (first occurrence only)
              T=$(grep -o '<Counters total="[0-9]*"' "$trx" | head -n1 | grep -o '[0-9]*' || echo 0)
              P=$(grep -o 'passed="[0-9]*"' "$trx" | head -n1 | grep -o '[0-9]*' || echo 0)
              F=$(grep -o 'failed="[0-9]*"' "$trx" | head -n1 | grep -o '[0-9]*' || echo 0)
              TOTAL=$((TOTAL + T))
              PASSED=$((PASSED + P))
              FAILED=$((FAILED + F))
            fi
          done < <(find "${{ inputs.test-results-directory }}" -type f -name "*.trx")
          SKIPPED=$((TOTAL - PASSED - FAILED))
        fi
        
        echo "total=$TOTAL" >> $GITHUB_OUTPUT
        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "failed=$FAILED" >> $GITHUB_OUTPUT
        echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
    
    - name: Parse coverage results
      id: coverage
      if: ${{ inputs.include-coverage == 'true' }}
      shell: bash
      env:
        TEST_RESULTS_DIRECTORY: ${{ inputs.test-results-directory }}
      run: |
        set -euo pipefail
        
        # Parse and merge coverage from all Cobertura XML reports.
        COVERAGE="N/A"
        if [ -d "${{ inputs.test-results-directory }}" ]; then
          COVERAGE=$(python3 <<'PY'
        import os, xml.etree.ElementTree as ET
        from pathlib import Path
        root_dir = Path(os.environ.get('TEST_RESULTS_DIRECTORY') or 'TestResults')
        workdir = Path.cwd().resolve()

        def is_test_or_canary(filename):
            normalized = filename.replace('\\', '/')
            return '.Tests' in normalized or '.Canary' in normalized

        def canonical_source_key(filename):
            path = Path(filename)
            candidates = [path]
            if not path.is_absolute():
                candidates.append((workdir / path).resolve())
                candidates.append(Path(path.as_posix().lstrip('/')).resolve())
            for candidate in candidates:
                try:
                    resolved = candidate.resolve()
                except OSError:
                    continue
                if resolved.exists():
                    try:
                        return str(resolved.relative_to(workdir)).replace('\\', '/').lower()
                    except ValueError:
                        return str(resolved).replace('\\', '/').lower()
            return path.as_posix().lstrip('/').lower()

        line_hits = {}
        for cov in root_dir.rglob('coverage.cobertura.xml'):
            try:
                root = ET.parse(cov).getroot()
            except Exception:
                continue
            for cls in root.findall('.//class'):
                filename = cls.attrib.get('filename') or ''
                if not filename or is_test_or_canary(filename):
                    continue
                key = canonical_source_key(filename)
                for line in cls.findall('.//line'):
                    try:
                        num = int(line.attrib.get('number', '0'))
                        hits = int(line.attrib.get('hits', '0'))
                    except ValueError:
                        continue
                    line_hits.setdefault(key, {})[num] = max(line_hits.setdefault(key, {}).get(num, 0), hits)
        total = sum(len(lines) for lines in line_hits.values())
        if not total:
            print('N/A')
        else:
            covered = sum(1 for lines in line_hits.values() for hits in lines.values() if hits > 0)
            print(f'{covered / total * 100:.1f}')
        PY
        )
        fi
        echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
    
    - name: Generate PR summary
      id: generate
      shell: bash
      env:
        COVERAGE_GATE_VERDICT: ${{ inputs.coverage-gate-verdict }}
        OUTDATED_PACKAGES_MARKDOWN: ${{ inputs.outdated-packages-markdown }}
      run: |
        set -euo pipefail
        
        # Build the markdown content once and both write to step summary and set as an output
        TOTAL="${{ steps.test-results.outputs.total }}"
        PASSED="${{ steps.test-results.outputs.passed }}"
        FAILED="${{ steps.test-results.outputs.failed }}"
        SKIPPED="${{ steps.test-results.outputs.skipped }}"
        
        TOTAL=${TOTAL:-0}
        PASSED=${PASSED:-0}
        FAILED=${FAILED:-0}
        SKIPPED=${SKIPPED:-0}
        
        {
          echo "## :rocket: PR Validation Summary"
          echo ""
          
          if [ "${{ inputs.build-status }}" = "success" ]; then
            echo "### :white_check_mark: Build: **Passed**"
          else
            echo "### :x: Build: **Failed**"
          fi
          echo ""
          
          if [ "$TOTAL" -gt 0 ]; then
            echo "### :test_tube: Tests: $PASSED / $TOTAL passed"
            echo ""
            echo "| Status | Count |"
            echo "|--------|-------|"
            echo "| :white_check_mark: Passed | $PASSED |"
            if [ "$FAILED" -gt 0 ]; then
              echo "| :x: Failed | $FAILED |"
            fi
            if [ "$SKIPPED" -gt 0 ]; then
              echo "| :next_track_button: Skipped | $SKIPPED |"
            fi
            echo ""
          else
            echo "### :test_tube: Tests: No tests found"
            echo ""
          fi
          
          if [ "${{ inputs.include-coverage }}" = "true" ]; then
            COVERAGE="${{ steps.coverage.outputs.coverage }}"
            if [ -n "$COVERAGE" ] && [ "$COVERAGE" != "N/A" ]; then
              echo "### :bar_chart: Code Coverage: ${COVERAGE}%"
              echo ""
            fi
          fi

          if [ -n "$COVERAGE_GATE_VERDICT" ]; then
            if [[ "$COVERAGE_GATE_VERDICT" == FAILED* ]]; then
              GATE_ICON=":x:"
            elif [[ "$COVERAGE_GATE_VERDICT" == skipped* ]]; then
              GATE_ICON=":fast_forward:"
            else
              GATE_ICON=":white_check_mark:"
            fi
            echo "### Coverage Gate"
            echo "$GATE_ICON Coverage gate: $COVERAGE_GATE_VERDICT"
            echo ""
          fi

          if [ -n "$OUTDATED_PACKAGES_MARKDOWN" ]; then
            echo "### :warning: Outdated Packages (non-blocking)"
            echo "$OUTDATED_PACKAGES_MARKDOWN"
            echo ""
            echo "These do not block this PR. Tracked per-repo in the 📦 Outdated Dependencies issue."
            echo ""
          fi
          
          echo "### :information_source: Details"
          echo "- **Commit:** \`${{ github.sha }}\`"
          echo "- **Branch:** \`${{ github.ref_name }}\`"
          echo "- **Triggered by:** @${{ github.actor }}"
          if [ -n "${{ inputs.project-name }}" ]; then
            echo "- **Project:** ${{ inputs.project-name }}"
          fi
          echo ""
          echo "---"
          echo "_View detailed logs in the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_"
        } > summary.md
        
        # Write to the PR summary panel
        cat summary.md >> $GITHUB_STEP_SUMMARY
        
        # Set as output
        {
          echo "content<<EOF"
          cat summary.md
          echo "EOF"
        } >> $GITHUB_OUTPUT

name: 'Fetch Azure Key Vault Secrets'
description: 'Retrieve secrets from Azure Key Vault and expose them as environment variables, outputs, or substitute into config files'
inputs:
  vault-name:
    description: 'Azure Key Vault name (e.g., kv-honeydrunk-prod)'
    required: true
  secrets:
    description: >
      Newline-separated list of secrets to fetch. Each line: SECRET_NAME or SECRET_NAME=ENV_VAR_NAME.
      Example:
        ConnectionStrings--AppDb
        PostHog--ApiKey=POSTHOG_API_KEY
        Sentry--Dsn
    required: true
  export-as:
    description: 'How to expose fetched secrets: "env" (environment variables), "output" (step outputs), or "both"'
    required: false
    default: 'env'
  config-file:
    description: 'Path to a JSON config file (e.g., appsettings.json) for token substitution. Empty to skip.'
    required: false
    default: ''
  config-token-prefix:
    description: 'Token prefix for config substitution (e.g., "#{" results in #{SECRET_NAME}# being replaced)'
    required: false
    default: '#{'
  config-token-suffix:
    description: 'Token suffix for config substitution'
    required: false
    default: '}#'
  mask-values:
    description: 'Mask secret values in logs (always true for security, exposed for testing only)'
    required: false
    default: 'true'
outputs:
  fetched-count:
    description: 'Number of secrets successfully fetched'
    value: ${{ steps.fetch.outputs.fetched-count }}
  secret-names:
    description: 'Comma-separated list of secret names that were fetched'
    value: ${{ steps.fetch.outputs.secret-names }}
runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        set -euo pipefail
        if [ -z "${{ inputs.vault-name }}" ]; then
          echo "::error::vault-name is required"
          exit 1
        fi
        if [ -z "${{ inputs.secrets }}" ]; then
          echo "::error::secrets list is required"
          exit 1
        fi

    - name: Fetch secrets from Key Vault
      id: fetch
      shell: bash
      env:
        VAULT_NAME: ${{ inputs.vault-name }}
        SECRETS_INPUT: ${{ inputs.secrets }}
        EXPORT_AS: ${{ inputs.export-as }}
        MASK_VALUES: ${{ inputs.mask-values }}
      run: |
        set -euo pipefail
        FETCHED=0
        SECRET_NAMES=""

        while IFS= read -r line; do
          # Skip empty lines and comments
          [[ -z "$line" || "$line" =~ ^# ]] && continue

          # Parse SECRET_NAME or SECRET_NAME=ENV_VAR_NAME
          if [[ "$line" == *"="* ]]; then
            KV_SECRET="${line%%=*}"
            ENV_NAME="${line#*=}"
          else
            KV_SECRET="$line"
            # Convert Key Vault naming (-- delimited) to underscore env var style
            ENV_NAME=$(echo "$KV_SECRET" | sed 's/--/__/g' | sed 's/-/_/g')
          fi

          # Trim whitespace
          KV_SECRET=$(echo "$KV_SECRET" | xargs)
          ENV_NAME=$(echo "$ENV_NAME" | xargs)

          echo "Fetching secret: $KV_SECRET -> $ENV_NAME"

          # Fetch from Key Vault
          SECRET_VALUE=$(az keyvault secret show \
            --vault-name "$VAULT_NAME" \
            --name "$KV_SECRET" \
            --query "value" \
            --output tsv 2>/dev/null)

          if [ $? -ne 0 ] || [ -z "$SECRET_VALUE" ]; then
            echo "::error::Failed to fetch secret '$KV_SECRET' from vault '$VAULT_NAME'"
            exit 1
          fi

          # Mask the value in logs
          if [ "$MASK_VALUES" == "true" ]; then
            echo "::add-mask::$SECRET_VALUE"
          fi

          # Export as environment variable
          if [ "$EXPORT_AS" == "env" ] || [ "$EXPORT_AS" == "both" ]; then
            echo "$ENV_NAME=$SECRET_VALUE" >> "$GITHUB_ENV"
          fi

          # Export as step output
          if [ "$EXPORT_AS" == "output" ] || [ "$EXPORT_AS" == "both" ]; then
            echo "$ENV_NAME=$SECRET_VALUE" >> "$GITHUB_OUTPUT"
          fi

          FETCHED=$((FETCHED + 1))
          if [ -n "$SECRET_NAMES" ]; then
            SECRET_NAMES="$SECRET_NAMES,$KV_SECRET"
          else
            SECRET_NAMES="$KV_SECRET"
          fi

        done <<< "$SECRETS_INPUT"

        echo "fetched-count=$FETCHED" >> "$GITHUB_OUTPUT"
        echo "secret-names=$SECRET_NAMES" >> "$GITHUB_OUTPUT"
        echo "Successfully fetched $FETCHED secrets"

    - name: Substitute tokens in config file
      if: ${{ inputs.config-file != '' }}
      shell: bash
      env:
        CONFIG_FILE: ${{ inputs.config-file }}
        TOKEN_PREFIX: ${{ inputs.config-token-prefix }}
        TOKEN_SUFFIX: ${{ inputs.config-token-suffix }}
        SECRETS_INPUT: ${{ inputs.secrets }}
        VAULT_NAME: ${{ inputs.vault-name }}
      run: |
        set -euo pipefail
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "::error::Config file not found: $CONFIG_FILE"
          exit 1
        fi

        echo "Substituting tokens in $CONFIG_FILE..."
        SUBSTITUTED=0

        while IFS= read -r line; do
          [[ -z "$line" || "$line" =~ ^# ]] && continue

          if [[ "$line" == *"="* ]]; then
            KV_SECRET="${line%%=*}"
            ENV_NAME="${line#*=}"
          else
            KV_SECRET="$line"
            ENV_NAME=$(echo "$KV_SECRET" | sed 's/--/__/g' | sed 's/-/_/g')
          fi

          KV_SECRET=$(echo "$KV_SECRET" | xargs)
          ENV_NAME=$(echo "$ENV_NAME" | xargs)

          # Read from the env var set by the fetch step (avoids re-fetching from Key Vault)
          SECRET_VALUE="${!ENV_NAME}"
          if [ -z "$SECRET_VALUE" ]; then
            echo "::warning::No env var '$ENV_NAME' found for secret '$KV_SECRET' — skipping token substitution"
            continue
          fi

          TOKEN="${TOKEN_PREFIX}${ENV_NAME}${TOKEN_SUFFIX}"

          if grep -q "$TOKEN" "$CONFIG_FILE"; then
            # Use perl with env vars for safe substitution (handles $, \, @ in values)
            export __KV_TOKEN="$TOKEN"
            export __KV_VALUE="$SECRET_VALUE"
            perl -i -pe 's/\Q$ENV{__KV_TOKEN}\E/$ENV{__KV_VALUE}/g' "$CONFIG_FILE"
            SUBSTITUTED=$((SUBSTITUTED + 1))
            echo "  Replaced token: $TOKEN"
          fi

        done <<< "$SECRETS_INPUT"

        echo "Substituted $SUBSTITUTED tokens in $CONFIG_FILE"

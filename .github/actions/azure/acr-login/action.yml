# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: 'Login to Azure Container Registry'
description: 'Authenticate with ACR via GitHub OIDC federation'
inputs:
  registry:
    description: 'ACR login server (e.g., myregistry.azurecr.io)'
    required: true
  client-id:
    description: 'Azure AD application (client) ID'
    required: true
  tenant-id:
    description: 'Azure AD tenant ID'
    required: true
  subscription-id:
    description: 'Azure subscription ID'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Validate OIDC inputs
      shell: bash
      env:
        ACR_REGISTRY: ${{ inputs.registry }}
        CLIENT_ID: ${{ inputs.client-id }}
        TENANT_ID: ${{ inputs.tenant-id }}
        SUBSCRIPTION_ID: ${{ inputs.subscription-id }}
      run: |
        set -euo pipefail
        if [ -z "$ACR_REGISTRY" ]; then
          echo "::error::ACR registry is required"
          exit 1
        fi

        if [ -z "$CLIENT_ID" ] || [ -z "$TENANT_ID" ] || [ -z "$SUBSCRIPTION_ID" ]; then
          echo "::error::client-id, tenant-id, and subscription-id are required for OIDC ACR login"
          exit 1
        fi

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.client-id }}
        tenant-id: ${{ inputs.tenant-id }}
        subscription-id: ${{ inputs.subscription-id }}

    - name: Login to ACR
      shell: bash
      env:
        ACR_REGISTRY: ${{ inputs.registry }}
      run: |
        set -euo pipefail
        ACR_NAME="${ACR_REGISTRY%%.*}"
        az acr login --name "$ACR_NAME"

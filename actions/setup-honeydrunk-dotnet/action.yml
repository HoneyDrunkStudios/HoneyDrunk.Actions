# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: 'Setup HoneyDrunk .NET'
description: 'Install the .NET SDK from an explicit version or global.json, with optional GitHub Packages NuGet auth'
inputs:
  dotnet-version:
    description: 'The .NET SDK version to install. Leave empty to read global.json.'
    required: false
    default: ''
  dotnet-quality:
    description: 'Quality of the .NET SDK version (e.g., daily, signed, validated, preview, ga)'
    required: false
    default: ''
  global-json-file:
    description: 'Path to global.json to use when dotnet-version is empty'
    required: false
    default: 'global.json'
  configure-github-packages:
    description: 'Add GitHub Packages as a NuGet source using the workflow token'
    required: false
    default: 'false'
  github-packages-owner:
    description: 'GitHub organization or user that owns the NuGet package feed. Defaults to the repository owner.'
    required: false
    default: ''
  github-token:
    description: 'GitHub token for GitHub Packages. Defaults to github.token; do not pass a PAT.'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Checkout HoneyDrunk.Actions
      uses: actions/checkout@v4
      with:
        repository: HoneyDrunkStudios/HoneyDrunk.Actions
        ref: ${{ github.action_ref || 'main' }}
        path: .honeydrunk-actions-setup-dotnet

    - name: Setup .NET SDK
      uses: ./.honeydrunk-actions-setup-dotnet/.github/actions/dotnet/setup
      with:
        dotnet-version: ${{ inputs.dotnet-version }}
        dotnet-quality: ${{ inputs.dotnet-quality }}
        global-json-file: ${{ inputs.global-json-file }}
        configure-github-packages: ${{ inputs.configure-github-packages }}
        github-packages-owner: ${{ inputs.github-packages-owner }}
        github-token: ${{ inputs.github-token }}
